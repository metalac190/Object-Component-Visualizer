  return [
    { top:-1,    left:-1,  borderTop:"1.5px solid",    borderLeft:"1.5px solid"   },

        overflow:"hidden", minHeight:0,
        ...sx,
      }}
    >
      <Corners active={isDrop} />
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"3px 8px", minHeight:22,
        borderBottom:"1px solid " + P.border, background:P.panelB, flexShrink:0,

// ─── GAME VIEW — LIVE SIMULATION ─────────────────────────────────────────────
// Room shape (SVG viewBox 0-100 units, maps to % of container)
const ROOM_PTS  = "6,8 94,8 94,28 100,28 100,72 94,72 94,92 70,92 70,100 30,100 30,92 6,92 6,72 0,72 0,28 6,28";
const WALK_RECTS = [
  [0.06,0.08,0.94,0.92],
  [0.00,0.28,0.06,0.72],
  [0.94,0.28,1.00,0.72],
  [0.30,0.92,0.70,1.00],
];
const DUMMY_HOME = [
  { id:0, nx:0.22, ny:0.25 },
  { id:1, nx:0.82, ny:0.50 },
  { id:2, nx:0.45, ny:0.78 },
];
const DUM_MAX_HP = 5;
function inRoom(nx, ny) {
  return WALK_RECTS.some(([x1,y1,x2,y2]) => nx>=x1&&nx<=x2&&ny>=y1&&ny<=y2);
}

function GameView({ attached, params }) {
  const paramsRef = useRef(params);
  useEffect(() => { paramsRef.current = params; });

  const gsRef  = useRef(null);
  const rafRef = useRef(null);
  const [rs, setRs] = useState(null);

  const has = useCallback((id) => attached.some(t => t.id === id), [attached]);
  const gp  = useCallback((id, k, def) => {
    const p = paramsRef.current;
    return (p[id] && p[id][k] != null) ? p[id][k] : def;
  }, []);

  const attachedKey = attached.map(t=>t.id).sort().join(",");

  useEffect(() => {
    // Initialise fresh game state whenever component set changes
    const mhp = has("hp") ? gp("hp","maxHp",3)*20 : Infinity;
    gsRef.current = {
      e: { nx:0.5, ny:0.5, hp:mhp, maxHp:mhp,
           dead:false, deadTimer:0, atkTimer:0, spellTimer:0,
           wandTimer:0, wandTarget:{nx:0.5,ny:0.5} },
      dummies: DUMMY_HOME.map(d=>({...d,hp:DUM_MAX_HP,maxHp:DUM_MAX_HP,state:"alive",respTimer:0,hit:0})),
      proj:[],
      swing:null, spell:null, voice:null,
      floatTexts:[], _fid:0,
    };

    let last = 0;
    const tick = (t) => {
      rafRef.current = requestAnimationFrame(tick);
      const dt = Math.min((t-last)/1000, 0.05);
      last = t;
      if (dt <= 0) return;
      const gs = gsRef.current;
      const e  = gs.e;

      // Read component flags fresh each frame (closures over latest attached/params via ref)
      const hasMove   = has("move");
      const hasBrain  = has("brain");
      const hasMelee  = has("melee");
      const hasRanged = has("ranged");
      const hasMagic  = has("magic");
      const hasSight  = has("sight");
      const hasHp_    = has("hp");
      const hasArmor  = has("armor");
      const hasVoice  = has("voice");
      const hasElem   = has("element");

      // Helper: spawn a floating damage number
      const spawnFloat = (nx, ny, val, type) => {
        if (val < 0.5) return;
        gs.floatTexts.push({
          id: gs._fid++,
          nx: nx + (Math.random()-0.5)*0.06,
          ny: ny - 0.03,
          text: Math.max(1, Math.round(val)).toString(),
          type,
          age: 0,
        });
      };
      const elemBonus = hasElem ? gp("element","intensity",5)*0.8 : 0;

      const spd      = hasMove   ? gp("move",  "speed",    5)*0.05    : 0;
      const detR     = hasSight  ? gp("sight", "range",    5)*0.09    : 0.38;
      const meleeDist = 0.10;
      const atkCd   = hasMelee  ? 1.8/Math.max(0.5,gp("melee","speed",  5)/3) : 999;
      const mDmg    = hasMelee  ? gp("melee","damage",5)*1.5           : 0;
      const spellCd = hasMagic  ? gp("magic","cooldown",4)             : 999;
      const spellDmg= hasMagic  ? gp("magic","power",  8)*0.25         : 0;
      const projSpd = hasRanged ? gp("ranged","projSpeed",7)*0.18      : 0;
      const projDmg = hasRanged ? gp("ranged","damage",  4)*1.2        : 0;

      // Dead → respawn
      if (e.dead) {
        e.deadTimer -= dt;
        if (e.deadTimer <= 0) {
          const mh = hasHp_ ? gp("hp","maxHp",3)*20 : Infinity;
          Object.assign(e,{nx:0.5,ny:0.5,hp:mh,maxHp:mh,dead:false,atkTimer:0,spellTimer:0,wandTimer:0});
        }
      } else {
        // Dummies passively damage entity when adjacent
        if (hasHp_) {
          gs.dummies.forEach(d => {
            if (d.state !== "alive") return;
            const dx=d.nx-e.nx, dy=d.ny-e.ny;
            if (Math.sqrt(dx*dx+dy*dy) < meleeDist+0.04)
              e.hp -= (hasArmor ? 0.8 : 2.5)*dt;
          });
          if (e.hp <= 0) { e.dead=true; e.deadTimer=3.5; }
        }

        // Nearest alive dummy
        let nd=null, ndist=Infinity;
        gs.dummies.forEach(d => {
          if (d.state !== "alive") return;
          const dx=d.nx-e.nx, dy=d.ny-e.ny;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if (dist<ndist) { ndist=dist; nd=d; }
        });

        // Movement / AI
        if (hasBrain && hasMove && nd && ndist<detR) {
          // Chase
          const dx=nd.nx-e.nx, dy=nd.ny-e.ny;
          if (ndist>meleeDist) {
            const nx_=e.nx+(dx/ndist)*spd*dt;
            const ny_=e.ny+(dy/ndist)*spd*dt;
            if (inRoom(nx_,ny_)) { e.nx=nx_; e.ny=ny_; }
          }
          // Melee swing
          if (hasMelee && ndist<meleeDist+0.02) {
            e.atkTimer -= dt;
            if (e.atkTimer<=0) {
              e.atkTimer = atkCd;
              nd.hp = Math.max(0, nd.hp-mDmg);
              nd.hit = 0.35;
              spawnFloat(nd.nx, nd.ny, mDmg, "normal");
              if (hasElem) {
                nd.hp = Math.max(0, nd.hp-elemBonus);
                spawnFloat(nd.nx+0.04, nd.ny-0.04, elemBonus, "element");
              }
              gs.swing = { nx:e.nx, ny:e.ny, angle:Math.atan2(dy,dx), t:0.22 };
              if (hasVoice) gs.voice = { t:0.65 };
              if (nd.hp<=0) { nd.state="dead"; nd.respTimer=3; }
            }
          }
        } else if (hasMove) {
          // Wander
          e.wandTimer -= dt;
          if (e.wandTimer<=0) {
            e.wandTimer = 1.5+Math.random()*2;
            let wx,wy,att=0;
            do { wx=0.07+Math.random()*0.86; wy=0.1+Math.random()*0.82; att++; }
            while (!inRoom(wx,wy) && att<20);
            e.wandTarget = {nx:wx,ny:wy};
          }
          const dx=e.wandTarget.nx-e.nx, dy=e.wandTarget.ny-e.ny;
          const d=Math.sqrt(dx*dx+dy*dy);
          if (d>0.025) {
            const nx_=e.nx+(dx/d)*spd*0.55*dt;
            const ny_=e.ny+(dy/d)*spd*0.55*dt;
            if (inRoom(nx_,ny_)) { e.nx=nx_; e.ny=ny_; }
          }
        }

        // Ranged attack (only when outside melee range)
        if (hasRanged && nd && ndist>meleeDist && ndist<detR) {
          e.atkTimer -= dt;
          if (e.atkTimer<=0) {
            e.atkTimer = atkCd*1.6;
            const dx=nd.nx-e.nx, dy=nd.ny-e.ny;
            gs.proj.push({nx:e.nx,ny:e.ny,vx:(dx/ndist)*projSpd,vy:(dy/ndist)*projSpd,tid:nd.id,life:2.5});
          }
        }

        // Spell AoE
        if (hasMagic) {
          e.spellTimer -= dt;
          if (e.spellTimer<=0) {
            e.spellTimer = spellCd;
            gs.spell = { nx:e.nx, ny:e.ny, t:0.8 };
            gs.dummies.forEach(d => {
              if (d.state!=="alive") return;
              const dx=d.nx-e.nx, dy=d.ny-e.ny;
              if (Math.sqrt(dx*dx+dy*dy)<0.22) {
                d.hp=Math.max(0,d.hp-spellDmg); d.hit=0.35;
                spawnFloat(d.nx, d.ny, spellDmg, "spell");
                if (d.hp<=0){d.state="dead";d.respTimer=3;}
              }
            });
          }
        }
      }

      // Update projectiles
      gs.proj = gs.proj.filter(p => {
        p.nx+=p.vx*dt; p.ny+=p.vy*dt; p.life-=dt;
        if (p.life<=0||!inRoom(p.nx,p.ny)) return false;
        const tgt=gs.dummies.find(d=>d.id===p.tid&&d.state==="alive");
        if (tgt) {
          const dx=tgt.nx-p.nx, dy=tgt.ny-p.ny;
          if (Math.sqrt(dx*dx+dy*dy)<0.06) {
            tgt.hp=Math.max(0,tgt.hp-projDmg); tgt.hit=0.35;
            spawnFloat(tgt.nx, tgt.ny, projDmg, "ranged");
            if (hasElem) {
              tgt.hp=Math.max(0,tgt.hp-elemBonus);
              spawnFloat(tgt.nx+0.04, tgt.ny-0.04, elemBonus, "element");
            }
            if(tgt.hp<=0){tgt.state="dead";tgt.respTimer=3;}
            return false;
          }
        }
        return true;
      });

      // Update dummies
      gs.dummies.forEach(d => {
        d.hit=Math.max(0,(d.hit||0)-dt*3);
        if (d.state==="dead"){d.respTimer-=dt; if(d.respTimer<=0){d.hp=d.maxHp;d.state="alive";}}
      });

      // Decay effects
      if (gs.swing){gs.swing.t-=dt; if(gs.swing.t<=0)gs.swing=null;}
      if (gs.spell){gs.spell.t-=dt; if(gs.spell.t<=0)gs.spell=null;}
      if (gs.voice){gs.voice.t-=dt; if(gs.voice.t<=0)gs.voice=null;}

      // Age float texts — remove after 1.1 seconds
      gs.floatTexts.forEach(ft => { ft.age += dt; });
      gs.floatTexts = gs.floatTexts.filter(ft => ft.age < 1.1);

      // Snapshot for React render
      setRs({
        e:      {...e},
        dummies: gs.dummies.map(d=>({...d})),
        proj:    gs.proj.map(p=>({...p})),
        swing:  gs.swing  ? {...gs.swing}  : null,
        spell:  gs.spell  ? {...gs.spell}  : null,
        voice:  gs.voice  ? {...gs.voice}  : null,
        floatTexts: gs.floatTexts.map(ft=>({...ft})),
      });
    };

    rafRef.current = requestAnimationFrame(tick);
    return () => { if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [attachedKey]);

  const hasForm = has("form");
  const hasHp   = has("hp");
  const pc = (n) => (n*100)+"%";   // 0-1 normalized → CSS %

  return (
    <div style={{width:"100%",height:"100%",position:"relative",background:"#08050e",overflow:"hidden"}}>

      {/* ── Static room ── */}
      <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"
        style={{position:"absolute",inset:0,zIndex:1}}>
        <defs>
          <pattern id="rg" width="8" height="8" patternUnits="userSpaceOnUse">
            <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(70,50,90,.12)" strokeWidth=".4"/>
          </pattern>
        </defs>
        <polygon points={ROOM_PTS} fill="rgba(18,12,28,.92)"/>
        <polygon points={ROOM_PTS} fill="url(#rg)"/>
        <polygon points={ROOM_PTS} fill="none" stroke="rgba(110,80,150,.38)" strokeWidth="1.5"/>
      </svg>

      {/* ── Dynamic effects (SVG overlay) ── */}
      {rs && (
        <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"
          style={{position:"absolute",inset:0,zIndex:6,pointerEvents:"none"}}>
          {/* Detection ring */}
          {has("sight") && !rs.e.dead && (
            <ellipse cx={rs.e.nx*100} cy={rs.e.ny*100}
              rx={has("sight")?gp("sight","range",5)*9:36}
              ry={has("sight")?gp("sight","range",5)*9:36}
              fill="none" stroke="rgba(216,190,50,.11)" strokeWidth="1" strokeDasharray="2,3"/>
          )}
          {/* Spell AoE ring */}
          {rs.spell && (
            <ellipse cx={rs.spell.nx*100} cy={rs.spell.ny*100} rx={22} ry={22}
              fill="rgba(130,60,220,.07)" stroke="rgba(170,100,255,.75)" strokeWidth="1.5"
              opacity={Math.min(1,rs.spell.t*1.5)}/>
          )}
          {/* Attack swing */}
          {rs.swing && (
            <line
              x1={rs.swing.nx*100} y1={rs.swing.ny*100}
              x2={(rs.swing.nx+Math.cos(rs.swing.angle)*0.13)*100}
              y2={(rs.swing.ny+Math.sin(rs.swing.angle)*0.13)*100}
              stroke="rgba(230,210,100,.95)" strokeWidth="2.5" strokeLinecap="round"
              opacity={Math.min(1,rs.swing.t*5)}/>
          )}
          {/* Voice ripples */}
          {rs.voice && !rs.e.dead && [0,1,2].map(i=>(
            <circle key={i} cx={rs.e.nx*100} cy={rs.e.ny*100} r={7+i*8}
              fill="none" stroke="rgba(200,130,50,.55)" strokeWidth="1"
              opacity={Math.max(0,(rs.voice.t-i*0.18)*1.6)}/>
          ))}
        </svg>
      )}

      {/* ── Entity ── */}
      {rs && !rs.e.dead && (() => {
        const spriteId  = gp("form", "sprite", "abstract");
        const spriteData = SPRITES.find(s => s.id === spriteId);
        const useEmoji  = hasForm && spriteData && spriteData.emoji;
        const scale     = hasForm ? gp("form","scale",10)/10 : 1;
        const opacity   = hasForm ? gp("form","opacity",100)/100 : 1;
        const emojiSize = Math.round(18 * scale);
        const hpBarW    = useEmoji ? Math.max(26, emojiSize) : 26;
        return (
          <div style={{position:"absolute",left:pc(rs.e.nx),top:pc(rs.e.ny),
            transform:"translate(-50%,-50%)",zIndex:10,pointerEvents:"none"}}>
            {/* Health bar */}
            {hasHp && rs.e.maxHp<Infinity && (
              <div style={{position:"absolute",bottom:"calc(100% + 3px)",left:"50%",
                transform:"translateX(-50%)",width:hpBarW}}>
                <div style={{height:3,background:"rgba(40,15,15,.9)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",
                    width:Math.max(0,rs.e.hp/rs.e.maxHp*100)+"%",
                    background:"#c85050",borderRadius:2,transition:"width .08s"}}/>
                </div>
              </div>
            )}
            {/* Body — emoji sprite or blue circle */}
            {useEmoji ? (
              <span style={{
                fontSize: emojiSize,
                lineHeight: 1,
                display: "block",
                opacity: opacity,
                filter: hasForm ? "drop-shadow(0 0 4px rgba(80,110,230,.55))" : "none",
                userSelect: "none",
                transition: "font-size .25s, opacity .25s",
              }}>{spriteData.emoji}</span>
            ) : (
              <div style={{
                width:14, height:14, borderRadius:"50%",
                background:hasForm?"linear-gradient(135deg,#2838b0,#18206a)":"rgba(50,60,140,.18)",
                border:hasForm?"2px solid rgba(110,140,255,.88)":"1.5px dashed rgba(110,140,255,.28)",
                boxShadow:hasForm?"0 0 10px rgba(80,110,230,.65)":"none",
              }}/>
            )}
          </div>
        );
      })()}

      {/* ── Dummies ── */}
      {rs && rs.dummies.map(d=>(
        <div key={d.id} style={{position:"absolute",left:pc(d.nx),top:pc(d.ny),
          transform:"translate(-50%,-50%)",zIndex:8,pointerEvents:"none",
          opacity:d.state==="dead"?0.1:1,transition:"opacity .35s"}}>
          {d.state==="alive" && (
            <div style={{position:"absolute",bottom:"calc(100% + 3px)",left:"50%",
              transform:"translateX(-50%)",width:20}}>
              <div style={{height:2.5,background:"rgba(15,35,15,.9)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:(d.hp/d.maxHp*100)+"%",
                  background:"#60b870",borderRadius:2,transition:"width .08s"}}/>
              </div>
            </div>
          )}
          <div style={{
            width:11,height:11,borderRadius:2,
            background:d.hit>0?"rgba(210,90,40,.95)":"rgba(70,55,25,.9)",
            border:"1.5px solid "+(d.hit>0?"rgba(255,150,70,.95)":"rgba(150,130,50,.5)"),
            transition:"background .05s",
          }}/>
        </div>
      ))}

      {/* ── Projectiles ── */}
      {rs && rs.proj.map((p,i)=>(
        <div key={i} style={{position:"absolute",zIndex:11,
          left:pc(p.nx),top:pc(p.ny),transform:"translate(-50%,-50%)",
          width:5,height:5,borderRadius:"50%",
          background:"rgba(245,215,80,.95)",
          boxShadow:"0 0 5px rgba(245,215,80,.7)",
          pointerEvents:"none"}}/>
      ))}

      {/* ── Floating combat text ── */}
      {rs && rs.floatTexts && rs.floatTexts.map(ft => {
        const t = ft.age / 1.1;                        // 0→1 over lifetime
        // Pop-in: 0→0.12 scale up, 0.12→0.22 slight overshoot settle
        const scale = t < 0.12 ? 0.4 + (t/0.12)*1.1
                    : t < 0.22 ? 1.5 - ((t-0.12)/0.10)*0.5
                    : 1.0;
        // Opacity: fade in fast, stay, fade out last 40%
        const opacity = t < 0.15 ? t/0.15
                      : t < 0.62 ? 1
                      : 1 - ((t-0.62)/0.38);
        const floatPx = t * -28;                       // drift up 28px over lifetime

        const COLOR = {
          normal:  "rgba(255,255,255,0.97)",
          element: "#ff8c30",                          // fire orange
          spell:   "rgba(210,130,255,0.97)",           // arcane purple
          ranged:  "rgba(245,215,80,0.97)",            // arrow yellow
        };

        return (
          <div key={ft.id} style={{
            position:"absolute", zIndex:20, pointerEvents:"none",
            left:pc(ft.nx), top:pc(ft.ny),
            transform:`translate(-50%, calc(-50% + ${floatPx}px)) scale(${scale.toFixed(3)})`,
            color: COLOR[ft.type] || COLOR.normal,
            fontSize: ft.type==="element" ? 10 : 12,
            fontWeight: 700,
            fontFamily: "'Jost', sans-serif",
            letterSpacing: 0.5,
            textShadow: "0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6)",
            opacity: Math.max(0, opacity),
            userSelect: "none",
          }}>{ft.text}</div>
        );
      })}

      {/* ── Empty hint ── */}
      {attached.length===0 && (
        <div style={{position:"absolute",inset:0,display:"flex",
          alignItems:"center",justifyContent:"center",pointerEvents:"none",zIndex:15}}>
          <div style={{fontSize:8,color:"rgba(120,90,150,.38)",
            fontFamily:"monospace",letterSpacing:2,textAlign:"center"}}>
            EMPTY ENTITY<br/>add components
          </div>
        </div>
      )}
    </div>
  );
}



// ─── SLIDER ROW ───────────────────────────────────────────────────────────────
// Uses plain block-level divs (not flex-column) so stacking is guaranteed on
// every mobile browser. Block divs always stack vertically — no layout ambiguity.
function SliderRow({ slider, value, onChange }) {
  const displayVal = Number.isInteger(slider.step)
    ? Math.round(value)
    : value.toFixed(1);
  const unitStr = slider.unit ? " " + slider.unit : "";
  return (
    <div style={{ width:"100%", padding:"4px 0 7px" }}>
      {/* Header: label + current value side by side */}
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
        <span style={{ fontSize:7.5, color:P.textMd, fontFamily:"monospace" }}>
          {slider.label}
        </span>
        <span style={{ fontSize:7.5, color:P.amber, fontFamily:"monospace" }}>
          {displayVal}{unitStr}
        </span>
      </div>
      {/* Slider: its own block-level div forces a new line */}
      <div style={{ width:"100%", marginBottom:4 }}>
        <input
          type="range"
          min={slider.min} max={slider.max} step={slider.step}
          value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="mw-slider"
          style={{ display:"block", width:"100%", cursor:"pointer" }}
        />
      </div>
      {/* Range hint labels */}
      <div style={{ display:"flex", justifyContent:"space-between" }}>
        <span style={{ fontSize:5.5, color:P.textDk, fontFamily:"monospace" }}>
          {slider.min}{unitStr}
        </span>
        <span style={{ fontSize:5.5, color:P.textDk, fontFamily:"monospace" }}>
          {slider.max}{unitStr}
        </span>
      </div>
    </div>
  );
}

              style={{

// ─── DRAG GHOST ───────────────────────────────────────────────────────────────

  return (
    <div style={{
      position:"fixed",
      left: ghostPos.x - 24,
      top:  ghostPos.y - 50,
      pointerEvents:"none",
      zIndex:9999,
      display:"flex", alignItems:"center", gap:8,
      padding:"6px 12px",
      background:"#12091e",
      border:"1.5px solid " + P.amber,
      borderRadius:6,
      boxShadow:"0 4px 20px rgba(0,0,0,.7)",
      fontFamily:"'Jost',sans-serif",
      whiteSpace:"nowrap",
      animation:"mwGhostPop .12s ease",
    }}>

}

// ─── INTRO VISUAL ─────────────────────────────────────────────────────────────
function IntroVisual({ slide, compCount }) {
  const entityStyle = {
    background:"linear-gradient(145deg,#101e60 0%,#1a2e88 55%,#0d164a 100%)",
    border:"2px solid rgba(80,120,220,.55)",
    display:"flex", alignItems:"center", justifyContent:"center",
    animation:"mwIntroShimmer 2.8s ease-in-out infinite",
    transition:"all .5s cubic-bezier(.34,1.56,.64,1)",
  };

  // ── TITLE slide ──
  if (slide.visual === "title") {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10, padding:"16px 0" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{
            border:"1.5px solid rgba(80,120,220,.7)", borderRadius:7,
            padding:"8px 16px", fontSize:13, color:"rgba(120,160,255,.9)",
            fontWeight:700, letterSpacing:.8,
          }}>OBJECT</div>
          <div style={{
            display:"flex", flexDirection:"column", alignItems:"center", gap:4,
          }}>
            <div style={{ width:1, height:12, background:"rgba(240,200,74,.3)" }} />
            <div style={{ fontSize:11, color:P.textDk }}>+</div>
            <div style={{ width:1, height:12, background:"rgba(240,200,74,.3)" }} />
          </div>
          <div style={{
            border:"1.5px solid " + P.amber, borderRadius:7,
            padding:"8px 16px", fontSize:13, color:P.amber,
            fontWeight:700, letterSpacing:.8,
          }}>COMPONENT</div>
        </div>
        <div style={{
          width:2, height:16,
          background:"linear-gradient(to bottom,rgba(240,200,74,.5),rgba(120,160,255,.5))",
        }} />
        <div style={{
          border:"1.5px solid rgba(200,200,255,.25)", borderRadius:7,
          padding:"7px 20px", fontSize:11, color:"rgba(200,200,255,.5)",
          letterSpacing:1.5,
        }}>GAME ENTITY</div>
      </div>
    );
  }

  // ── ENTITY ONLY slide ──
  if (slide.visual === "entity") {
    return (
      <div style={{ ...entityStyle, width:82, height:82, borderRadius:"50%",
        boxShadow:"0 0 36px rgba(60,100,210,.28),inset 0 0 18px rgba(60,100,210,.12)" }}>
        <span style={{ fontSize:9, color:"rgba(80,120,220,.5)", fontFamily:"monospace", letterSpacing:2 }}>ENTITY</span>
      </div>
    );
  }

  // ── COMPONENT DEFINITION slide ──
  if (slide.visual === "compdef") {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:0 }}>
        {/* A single component rect */}
        <div style={{
          display:"flex", alignItems:"center", gap:8,
          padding:"7px 18px",
          border:"1.5px solid " + P.amber, borderRadius:6,
          background:"rgba(240,200,74,.05)", width:190,
          animation:"mwCompFlyIn .4s ease",
        }}>
          <span style={{ fontSize:14 }}>📜</span>
          <span style={{ fontSize:10, color:P.amber, letterSpacing:.5 }}>CustomScript.cs</span>
          <div style={{ marginLeft:"auto", width:7, height:7, borderRadius:"50%",
            background:P.amber, opacity:.7 }} />
        </div>
        {/* Connector */}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", height:28 }}>
          <div style={{ width:2, flex:1,
            background:"linear-gradient(to bottom," + P.amber + ",rgba(80,120,220,.6))",
            opacity:.55 }} />
          <div style={{ width:6, height:6, borderRadius:"50%",
            background:"rgba(80,120,220,.7)", marginTop:-1 }} />
        </div>
        {/* Entity */}
        <div style={{ ...entityStyle, width:60, height:60, borderRadius:10,
          boxShadow:"0 0 24px rgba(60,100,210,.22)" }}>
          <span style={{ fontSize:8, color:"rgba(80,120,220,.5)", fontFamily:"monospace", letterSpacing:1.5 }}>ENTITY</span>
        </div>
      </div>
    );
  }

  // ── ROOM slide ──
  if (slide.visual === "room") {
    return <IntroRoomScene />;
  }

  // ── ATTACHED slide (components + connector + entity) ──
  const comps = INTRO_COMP_LIST.slice(0, compCount);
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:0 }}>
      {/* Component stack — newest on top */}
      <div style={{ display:"flex", flexDirection:"column", gap:4, alignItems:"center" }}>
        {[...comps].reverse().map((comp, i) => (
          <div key={comp.name} style={{
            display:"flex", alignItems:"center", gap:8,
            padding:"5px 12px",
            border:"1.5px solid " + P.amber, borderRadius:5,
            background:"rgba(240,200,74,.05)", width:185,
            animation:"mwCompFlyIn .35s cubic-bezier(.34,1.56,.64,1)",
            animationFillMode:"both",
            animationDelay:(i * 0.09) + "s",
          }}>
            <span style={{ fontSize:13, lineHeight:1 }}>{comp.emoji}</span>
            <span style={{ fontSize:9, color:P.amber, letterSpacing:.4 }}>{comp.name}</span>
            {/* Connector dot showing attachment point */}
            <div style={{ marginLeft:"auto", width:6, height:6, borderRadius:"50%",
              background:P.amber, opacity:.65, flexShrink:0 }} />
          </div>
        ))}
      </div>

      {/* Vertical connector between stack and entity */}
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", height:26 }}>
        <div style={{
          width:2, flex:1,
          background:"linear-gradient(to bottom," + P.amber + ",rgba(80,120,220,.65))",
          opacity:.5,
        }} />
        <div style={{
          width:8, height:8, borderRadius:"50%",
          background:"rgba(80,120,220,.7)",
          marginTop:-1, border:"1.5px solid rgba(80,120,220,.4)",
        }} />
      </div>

      {/* Entity — square to show it "contains" the components */}
      <div style={{
        ...entityStyle,
        width:64, height:64, borderRadius:10,
        boxShadow:"0 0 28px rgba(60,100,210,.25),inset 0 0 14px rgba(60,100,210,.1)",
      }}>
        <span style={{ fontSize:8, color:"rgba(80,120,220,.5)", fontFamily:"monospace", letterSpacing:1.5 }}>ENTITY</span>
      </div>
    </div>
  );

  // unreachable — satisfies linter
  return null;
}

// ── ROOM SCENE (slide 6) ── drawn as a mini top-down dungeon room
function IntroRoomScene() {
  // Each object: {x,y} position (%), color, and component rects [{w,h,ox,oy}]
  const objects = [
    // Top-left: 2 components
    { x:22, y:28, comps:[{ox:-18,oy:-6,w:14,h:7},{ox:-18,oy:4,w:14,h:7}] },
    // Right-center: 3 components
    { x:68, y:45, comps:[{ox:18,oy:-10,w:14,h:7},{ox:18,oy:0,w:14,h:7},{ox:18,oy:10,w:14,h:7}] },
    // Bottom-left: 1 component
    { x:30, y:70, comps:[{ox:-18,oy:0,w:14,h:7}] },
    // Bottom-right: 2 components
    { x:72, y:72, comps:[{ox:18,oy:-4,w:14,h:7},{ox:18,oy:6,w:14,h:7}] },
  ];

  return (
    <div style={{
      width:220, height:150, position:"relative",
      background:"#05030f",
      border:"1.5px solid rgba(80,120,220,.25)",
      borderRadius:8,
      overflow:"visible",
    }}>
      {/* floor grid */}
      <div style={{
        position:"absolute", inset:0, borderRadius:7,
        backgroundImage:
          "linear-gradient(rgba(60,30,120,.12) 1px,transparent 1px)," +
          "linear-gradient(90deg,rgba(60,30,120,.12) 1px,transparent 1px)",
        backgroundSize:"18px 18px",
        overflow:"hidden",
      }} />
      {/* Room walls — subtle inner border */}
      <div style={{
        position:"absolute", inset:4,
        border:"1px solid rgba(80,120,220,.15)",
        borderRadius:5, pointerEvents:"none",
      }} />

      {/* Objects + components */}
      {objects.map((obj, oi) => (
        <div key={oi} style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%" }}>
          {/* Component rects */}
          {obj.comps.map((c, ci) => (
            <div key={ci} style={{
              position:"absolute",
              left:"calc(" + obj.x + "% + " + c.ox + "px - " + (c.w/2) + "px)",
              top:"calc(" + obj.y + "% + " + c.oy + "px - " + (c.h/2) + "px)",
              width:c.w, height:c.h,
              background:"rgba(200,120,32,.75)",
              border:"1px solid rgba(240,200,74,.6)",
              borderRadius:2,
              animation:"mwIntroShimmer2 " + (2 + oi * 0.4 + ci * 0.2) + "s ease-in-out infinite",
            }} />
          ))}
          {/* Connector lines from entity to each component */}
          {obj.comps.map((c, ci) => {
            // Draw a thin line from entity center to component center
            const ex = 0, ey = 0; // relative to entity center
            const dx = c.ox, dy = c.oy;
            const len = Math.sqrt(dx*dx + dy*dy);
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            return (
              <div key={"ln-" + ci} style={{
                position:"absolute",
                left:"calc(" + obj.x + "% + 0px)",
                top:"calc(" + obj.y + "% + 0px)",
                width:len, height:1,
                background:"rgba(200,120,32,.22)",
                transformOrigin:"0 50%",
                transform:"rotate(" + angle + "deg)",
              }} />
            );
          })}
          {/* Blue game object square */}
          <div style={{
            position:"absolute",
            left:"calc(" + obj.x + "% - 9px)",
            top:"calc(" + obj.y + "% - 9px)",
            width:18, height:18,
            background:"linear-gradient(135deg,#101e60,#1a2e88)",
            border:"1.5px solid rgba(80,120,220,.7)",
            borderRadius:3,
            boxShadow:"0 0 8px rgba(60,100,210,.35)",
          }} />
        </div>
      ))}
    </div>
  );
}

// ─── INTRO SCREEN ─────────────────────────────────────────────────────────────
function IntroScreen({ onComplete }) {
  const [step, setStep]              = useState(0);
  const [revealedChars, setRevealed] = useState(0);
  const slide      = INTRO_SLIDES[step];
  const flatText   = slide.lines.join("\n");
  const totalChars = flatText.length;
  const isTextDone = revealedChars >= totalChars;
  const isLast     = !!slide.isLast;

  // Char-by-char timer — 28ms per character
  useEffect(() => {
    if (revealedChars >= totalChars) return;
    const t = setTimeout(() => setRevealed((r) => r + 1), 28);
    return () => clearTimeout(t);
  }, [revealedChars, totalChars]);

  // Reset on slide change
  useEffect(() => { setRevealed(0); }, [step]);

  const handleBtn = () => {
    if (!isTextDone) {
      setRevealed(totalChars);
    } else if (isLast) {
      onComplete();
    } else {
      setStep((s) => s + 1);
    }
  };

  // Pre-build character token list from flatText
  // Each token: { key, ch, isNewline }
  // We map revealedChars to show/hide each token via CSS opacity transition.
  // Using stable keys means React reuses DOM nodes — the transition plays
  // smoothly with no flash when a char moves from "latest" to "stable".
  const tokens = [];
  let gi = 0;
  flatText.split("\n").forEach((line, li, arr) => {
    [...line].forEach((ch) => {
      tokens.push({ key: gi, ch, isNewline: false });
      gi++;
    });
    if (li < arr.length - 1) {
      tokens.push({ key: gi, ch: "\n", isNewline: true });
      gi++;
    }
  });

  return (
    <div
      onClick={handleBtn}
      style={{
        position:"fixed", inset:0, zIndex:2000,
        background:"#040210",
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"flex-start",
        padding:"5vh 24px 28px",
        overflow:"auto",
        touchAction:"manipulation",
        userSelect:"none",
        cursor:"default",
      }}
    >

      {/* Step dots */}
      <div style={{ display:"flex", gap:6, marginBottom:"2vh" }}>
        {INTRO_SLIDES.map((_, i) => (
          <div key={i} style={{
            height:4, borderRadius:2,
            width: i === step ? 18 : 5,
            background: i < step ? P.amber : i === step ? P.goldLt : P.border,
            transition:"all .3s",
          }} />
        ))}
      </div>

      {/* Visual */}
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"center",
        marginBottom:"2vh", minHeight:155,
      }}>
        <IntroVisual slide={slide} compCount={slide.showComps} />
      </div>

      {/* Title */}
      <div
        key={"t-" + step}
        style={{
          fontSize:22, fontWeight:700, color:P.goldLt,
          letterSpacing:1.5, textAlign:"center",
          marginBottom:"1.5vh", whiteSpace:"pre-line",
          animation:"mwIntroSlideUp .28s ease",
        }}
      >{slide.title}</div>

      {/* Body text — char-by-char CSS transition, no flash */}
      <div style={{ maxWidth:340, width:"100%", marginBottom:"2.5vh", minHeight: slide.lines.length > 0 ? 80 : 0 }}>
        <div style={{ fontSize:17, color:P.textMd, lineHeight:1.85 }}>
          {tokens.map((tok) => {
            const visible = tok.key < revealedChars;
            if (tok.isNewline) {
              return visible ? <br key={tok.key} /> : <span key={tok.key} />;
            }
            return (
              <span
                key={tok.key}
                style={{
                  opacity: visible ? 1 : 0,
                  transition: "opacity 0.55s ease-out",
                }}
              >{tok.ch}</span>
            );
          })}
        </div>
      </div>

      {/* Triangle "tap to continue" indicator — sits just below the body text */}
      <div style={{
        marginTop:18,
        display:"flex", justifyContent:"center",
        pointerEvents:"none",
        opacity: isTextDone ? 1 : 0,
        transition:"opacity 0.7s ease",
      }}>
        <div style={{
          width:0, height:0,
          borderTop:"8px solid transparent",
          borderBottom:"8px solid transparent",
          borderLeft:"13px solid rgba(255,255,255,0.78)",
          animation: isTextDone ? "mwTriBounce 1.15s ease-in-out infinite" : "none",
          filter:"drop-shadow(0 0 3px rgba(255,255,255,0.25))",
        }} />
      </div>
    </div>
  );
}


function MonsterWorkshop() {
  const [attached,     setAttached]     = useState([]);
  const [selected,     setSelected]     = useState(null);
  const [challenge,    setChallenge]    = useState(null);
  const [chalDone,     setChalDone]     = useState(false);
  const [showWin,      setShowWin]      = useState(false);
  const [showBestiary, setShowBestiary] = useState(false);
  const [showInfo,     setShowInfo]     = useState(false);
  const [showIntro,    setShowIntro]    = useState(true);
  const [expanded,     setExpanded]     = useState(null);
  const [params,       setParams]       = useState({});

  // drag state
  const dragRef            = useRef(null);   // { id, name, emoji }
  const [ghostPos, setGhostPos] = useState(null);

  // panel refs for hit-testing
  const gameRef      = useRef(null);
  const inspectorRef = useRef(null);

  // ── drop zone highlight helpers ───────────────────────────────
  const isOverPanel = useCallback((ref) => {
    if (!ghostPos || !ref.current) return false;
    const r = ref.current.getBoundingClientRect();
    return ghostPos.x >= r.left && ghostPos.x <= r.right &&
           ghostPos.y >= r.top  && ghostPos.y <= r.bottom;
  }, [ghostPos]);
  const isOverGame      = isOverPanel(gameRef);
  const isOverInspector = isOverPanel(inspectorRef);

  // ── params helpers ────────────────────────────────────────────
  const getParam = (id, key, def) =>
    params[id] && params[id][key] != null ? params[id][key] : def;
  const setParam = useCallback((id, key, val) => {
    setParams((p) => ({ ...p, [id]: { ...(p[id] || {}), [key]: val } }));
  }, []);

  // ── attach / detach ───────────────────────────────────────────
  const attachAndCheck = useCallback((id) => {
    setAttached((prev) => {
      if (prev.find((t) => t.id === id)) return prev;
      const trait = TRAITS.find((t) => t.id === id);
      if (!trait) return prev;
      const next = [...prev, trait];
      setChallenge((ch) => {
        if (ch) {
          const done = ch.required.every((r) => next.some((t) => t.id === r));
          if (done) {
            setChalDone(true); setShowWin(true);
            setTimeout(() => setShowWin(false), 3000);
          }
        }
        return ch;
      });
      return next;
    });
  }, []);

  const detach = (id) => {
    setAttached((p) => p.filter((t) => t.id !== id));
    if (expanded === id) setExpanded(null);
  };
  const isOn = (id) => attached.some((t) => t.id === id);

  const resetAll = () => {
    setAttached([]); setChallenge(null);
    setChalDone(false); setSelected(null);
    setShowWin(false); setExpanded(null); setParams({});
    dragRef.current = null; setGhostPos(null);
  };

  const startChallenge = (ch) => {
    setChallenge(ch); setChalDone(false);
    setAttached([]); setSelected({ type:"challenge", data:ch });
    setShowBestiary(false); setExpanded(null); setParams({});
  };

  // ── pointer drag -- only fired from the drag handle strip ─────
  const handlePointerDown = useCallback((e, trait) => {
    if (isOn(trait.id)) return;
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    dragRef.current = { id: trait.id, name: trait.name, emoji: trait.emoji };
    setGhostPos({ x: e.clientX, y: e.clientY });
  }, [attached]); // eslint-disable-line

  const handlePointerMove = useCallback((e) => {
    if (!dragRef.current) return;
    setGhostPos({ x: e.clientX, y: e.clientY });
  }, []);

  const handlePointerUp = useCallback((e) => {
    if (!dragRef.current) return;
    const id = dragRef.current.id;
    dragRef.current = null;
    setGhostPos(null);
    const x = e.clientX, y = e.clientY;
    const over = (ref) => {
      if (!ref.current) return false;
      const r = ref.current.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    };
    if (over(gameRef) || over(inspectorRef)) attachAndCheck(id);
  }, [attachAndCheck]);

  // ── selection ─────────────────────────────────────────────────
  const sel = (type, data) =>
    setSelected((p) => p && p.type === type && p.data.id === data.id ? null : { type, data });
  const toggleExpanded = (id) => setExpanded((e) => e === id ? null : id);

  // ── derived ───────────────────────────────────────────────────
  const chalProgress = challenge ? challenge.required.filter((r) => isOn(r)).length : 0;
  const chalTotal    = challenge ? challenge.required.length : 0;
  const gameParams   = {};
  TRAITS.forEach((t) => {
    gameParams[t.id] = {};
    t.sliders.forEach((s) => { gameParams[t.id][s.key] = getParam(t.id, s.key, s.def); });
  });
  gameParams.form        = gameParams.form || {};
  gameParams.form.sprite = getParam("form", "sprite", "abstract");

  // ─────────────────────────────────────────────────────────────
  return (
    <>
      <style>{`

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body,#root{height:100%;background:${P.bg};overflow:hidden;}
        /* Desktop: zoom mw-root up for readability.
           Height must be divided by zoom so the VISUAL height still equals 100vh.
           Modals live OUTSIDE mw-root so fixed positioning works correctly. */
        .mw-root{font-family:'Jost',sans-serif;}
        @media(min-width:600px) and (max-width:1199px){
          .mw-root{zoom:1.3; height:calc(100vh / 1.3) !important; max-height:calc(100vh / 1.3) !important;}
        }
        @media(min-width:1200px){
          .mw-root{zoom:1.55; height:calc(100vh / 1.55) !important; max-height:calc(100vh / 1.55) !important;}
        }
        ::-webkit-scrollbar{width:2px;height:2px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${P.goldDk};border-radius:1px;}

        .mw-slider{-webkit-appearance:none;appearance:none;display:block;width:100%;height:4px;
          background:rgba(240,216,88,.25);border-radius:2px;outline:none;}
        .mw-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
          width:16px;height:16px;border-radius:50%;background:#f0d858;cursor:pointer;border:none;
          box-shadow:0 0 6px rgba(240,216,88,.5);}
        .mw-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;
          background:#f0d858;cursor:pointer;border:none;}


        @keyframes mwBounce    {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes mwRipple    {0%{transform:scale(.4);opacity:.85}100%{transform:scale(2.4);opacity:0}}
        @keyframes mwHP        {0%{opacity:.4;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
        @keyframes mwGlow      {0%,100%{opacity:.65}50%{opacity:1}}
        @keyframes mwSpin      {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes mwWisp      {0%{transform:translateY(0) scale(1);opacity:.7}100%{transform:translateY(-9px) scale(.5);opacity:.1}}
        @keyframes mwSwordBob  {0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-3px)}}
        @keyframes mwArrow     {0%,100%{transform:translateX(0);opacity:.5}50%{transform:translateX(5px);opacity:1}}
        @keyframes mwArmorPulse{0%,100%{opacity:.7}50%{opacity:1}}
        @keyframes mwStep      {0%{opacity:.18;transform:rotate(-8deg) translateY(0)}100%{opacity:.65;transform:rotate(-8deg) translateY(-3px)}}
        @keyframes mwThink     {0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-4px);opacity:1}}
        @keyframes mwSightPulse{0%,100%{opacity:.22}50%{opacity:.68}}
        @keyframes mwWin       {0%{transform:scale(0) rotate(-12deg);opacity:0}65%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
        @keyframes mwExpand    {from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        @keyframes mwModalIn   {from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
        @keyframes mwCompFlyIn   {from{opacity:0;transform:translateY(-24px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes mwIntroShimmer{0%,100%{box-shadow:0 0 36px rgba(60,100,210,.25)}50%{box-shadow:0 0 54px rgba(60,100,210,.5)}}
        @keyframes mwIntroSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes mwLineFadeIn  {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes mwIntroShimmer2{0%,100%{opacity:.65}50%{opacity:1}}
        @keyframes mwTriBounce   {0%,100%{transform:translateX(0);opacity:.55} 50%{transform:translateX(7px);opacity:1}}
        @keyframes mwAppBuildIn  {0%{opacity:0;transform:scale(.97) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}

        .mw-btn {cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none;}

        /* Handle: touch-action none only on the left drag strip */
        .mw-handle{touch-action:none;cursor:grab;user-select:none;}
        .mw-handle:active{cursor:grabbing;}
      `}</style>

      <DragGhost ghostPos={ghostPos} dragInfo={dragRef.current} />

            {/* COMPONENTS panel */}
            <Panel title="COMPONENTS" sx={{ flex:"0 0 calc(50% - 1px)" }}>
              {TRAITS.map((trait) => {
                const on       = isOn(trait.id);
                const isSel    = selected && selected.type === "trait" && selected.data.id === trait.id;
                const req      = challenge && challenge.required.includes(trait.id);
                const isDragging = ghostPos && dragRef.current && dragRef.current.id === trait.id;
                return (
                  <div
                    key={trait.id}
                    style={{
                      display:"flex", alignItems:"stretch",
                      borderBottom:"1px solid " + P.border,
                      boxShadow: isSel
                        ? "inset 2px 0 0 " + P.amberLt
                        : req ? "inset 2px 0 0 rgba(200,120,32,.5)"
                        : "inset 2px 0 0 transparent",
                      background: isSel ? "rgba(200,120,32,.07)" : "transparent",
                      opacity: isDragging ? 0.22 : 1,
                      transition:"opacity .1s, background .1s",
                    }}
                  >
                    {/* ── LEFT: drag handle (touch-action:none, pointer events here only) ── */}
                    <div
                      className={!on ? "mw-handle" : ""}
                      onPointerDown={!on ? (e) => handlePointerDown(e, trait) : undefined}
                      onPointerMove={!on ? handlePointerMove : undefined}
                      onPointerUp={!on ? handlePointerUp : undefined}
                      onPointerCancel={!on ? handlePointerUp : undefined}
                      // Prevent tapping the handle from triggering row selection
                      onClick={(e) => e.stopPropagation()}
                      style={{
                        width:40, flexShrink:0,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        borderRight:"1px solid " + P.border,
                        background: on ? "transparent" : "rgba(200,120,32,.03)",
                        cursor: on ? "default" : "grab",
                      }}
                    >
                      {!on && <GripDots />}
                    </div>

                    {/* ── RIGHT: name + status (normal scroll, no touch-action override) ── */}
                    <div
                      className="mw-chip"
                      onClick={() => sel("trait", trait)}
                      style={{
                        flex:1, display:"flex", alignItems:"center",
                        /* ~30% taller again: was 9px, now 12px top/bottom */
                        padding:"12px 8px",
                        minWidth:0,
                      }}
                    >
                      <span style={{
                        flex:1, fontSize:15,
                        fontFamily:"'Jost',sans-serif", letterSpacing:.15,
                        color: on ? P.textDk : P.amber,
                        whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                      }}>{trait.name}</span>
                      {on  && <span style={{ fontSize:11, color:P.textDk,  fontFamily:"monospace", flexShrink:0 }}>on</span>}
                      {!on && req && <span style={{ fontSize:11, color:P.amber, fontFamily:"monospace", flexShrink:0 }}>req</span>}
                    </div>
                  </div>
                );
              })}
            </Panel>

            {/* PREVIEW panel — hint when nothing selected, description when trait selected */}
            <Panel title="PREVIEW" sx={{ flex:1 }}>
              {selected && selected.type === "trait" ? (
                /* ── TRAIT DESCRIPTION ── */
                <div style={{ padding:"10px 10px", height:"100%", overflow:"auto" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <span style={{ fontSize:26, lineHeight:1, flexShrink:0 }}>{selected.data.emoji}</span>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700, color:P.text, letterSpacing:.3 }}>
                        {selected.data.name}
                      </div>
                      <div style={{ fontSize:10, color:P.textDk, fontFamily:"monospace", letterSpacing:1, marginTop:2 }}>
                        {selected.data.cat.toUpperCase()}
                      </div>
                    </div>
                  </div>
                  <div style={{ fontSize:12, color:P.textMd, lineHeight:1.75, marginBottom:10 }}>
                    {selected.data.desc}
                  </div>
                  <div style={{
                    padding:"6px 8px", borderRadius:4,
                    border:"1px solid " + P.border, background:P.panelAlt,
                    marginBottom:10,
                  }}>
                    <div style={{ fontSize:9, color:P.textDk, fontFamily:"monospace", letterSpacing:1, marginBottom:3 }}>
                      GRANTS
                    </div>
                    <div style={{ fontSize:12, color:P.text, fontStyle:"italic" }}>
                      {selected.data.ability}
                    </div>
                  </div>
                  <button className="mw-btn"
                    onClick={() => isOn(selected.data.id) ? detach(selected.data.id) : attachAndCheck(selected.data.id)}
                    style={{
                      width:"100%", padding:"7px",
                      border:"1px solid " + (isOn(selected.data.id) ? P.red : P.gold),
                      borderRadius:4,
                      background: isOn(selected.data.id) ? "rgba(156,48,48,.1)" : "rgba(196,154,44,.1)",
                      color: isOn(selected.data.id) ? P.redLt : P.goldLt,
                      fontSize:12, letterSpacing:1, fontWeight:600,
                      animation: isOn(selected.data.id) ? "none" : "mwGlow 1.6s ease-in-out infinite",
                    }}>
                    {isOn(selected.data.id) ? "x  REMOVE FROM ENTITY" : "+  ATTACH TO ENTITY"}
                  </button>
                </div>
              ) : (
                /* ── DEFAULT HINT ── */
                <div style={{
                  height:"100%", display:"flex",
                  alignItems:"center", justifyContent:"center",
                  padding:16,
                }}>
                  <div style={{
                    textAlign:"center",
                    fontSize:14, color:P.textDk,
                    fontFamily:"monospace", lineHeight:1.8,
                    letterSpacing:.3,
                  }}>
                    drag a component<br />
                    into game view<br />
                    to attach
                  </div>
                </div>
              )}
            </Panel>
          </div>
        </div>
      </div>{/* ← end mw-root scaled container */}

      {/* ══ FIXED OVERLAYS — rendered at true viewport level, unaffected by zoom ══ */}

        {/* INFO MODAL */}
        {showInfo && (
          <div onClick={() => setShowInfo(false)} style={{
            position:"fixed", inset:0, zIndex:400,
            background:"rgba(5,4,12,.88)",
            display:"flex", alignItems:"center", justifyContent:"center",
            padding:"16px",
          }}>
            <div onClick={(e) => e.stopPropagation()} style={{
              width:"100%", maxWidth:440, maxHeight:"80dvh",
              background:P.panel, border:"1.5px solid " + P.gold,
              borderRadius:10, overflow:"hidden",
              display:"flex", flexDirection:"column",
              position:"relative", animation:"mwModalIn .22s ease",
            }}>
              <Corners active={true} />
              <div style={{
                display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"8px 14px", borderBottom:"1px solid " + P.border,
                background:P.panelB, flexShrink:0,
              }}>
                <div>
                  <div style={{
                    fontFamily:"'Jost',sans-serif", fontSize:12,
                    color:P.goldLt, fontWeight:700, letterSpacing:1.5,
                  }}>OBJECT-COMPONENT PATTERN</div>
                  <div style={{ fontSize:8, color:P.textDk, fontFamily:"monospace", marginTop:1 }}>
                    the theory behind the workshop
                  </div>
                </div>
                <button className="mw-btn" onClick={() => setShowInfo(false)} style={{
                  color:P.textMd, fontSize:18, lineHeight:1, padding:"0 4px",
                }}>x</button>
              </div>
              <div style={{ overflowY:"auto", flex:1, padding:"4px 0" }}>
                {LORE.map((item) => (
                  <div key={item.id} style={{
                    padding:"14px 16px",
                    borderBottom:"1px solid " + P.border,
                  }}>
                    <div style={{
                      fontFamily:"'Jost',sans-serif", fontSize:11,
                      color:P.amber, letterSpacing:.4, marginBottom:8,
                    }}>{item.icon + "  " + item.title}</div>
                    <div style={{
                      fontSize:11, color:P.textMd, lineHeight:1.85,
                      whiteSpace:"pre-line", fontFamily:"'Jost',sans-serif",
                    }}>{item.body}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ══ BESTIARY MODAL ══ */}
        {showBestiary && (
          <div onClick={() => setShowBestiary(false)} style={{
            position:"fixed", inset:0, zIndex:400,
            background:"rgba(5,4,12,.88)",
            display:"flex", alignItems:"center", justifyContent:"center",
            padding:"16px",
          }}>
            <div onClick={(e) => e.stopPropagation()} style={{
              width:"100%", maxWidth:440, maxHeight:"80dvh",
              background:P.panel, border:"1.5px solid " + P.amber,
              borderRadius:10, overflow:"hidden",
              display:"flex", flexDirection:"column",
              position:"relative", animation:"mwModalIn .22s ease",
            }}>
              <Corners active={true} />
              <div style={{
                display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"8px 14px", borderBottom:"1px solid " + P.border,
                background:P.panelB, flexShrink:0,
              }}>
                <div>
                  <div style={{
                    fontFamily:"'Jost',sans-serif", fontSize:12,
                    color:P.amberLt, fontWeight:700, letterSpacing:1.5,
                  }}>BESTIARY</div>
                  <div style={{ fontSize:8, color:P.textDk, fontFamily:"monospace", marginTop:1 }}>
                    select a challenge to attempt
                  </div>
                </div>
                <button className="mw-btn" onClick={() => setShowBestiary(false)} style={{
                  color:P.textMd, fontSize:18, lineHeight:1, padding:"0 4px",
                }}>x</button>
              </div>
              <div style={{ overflowY:"auto", flex:1 }}>
                {CHALLENGES.map((ch) => {
                  const isAct  = challenge && challenge.id === ch.id;
                  const isDone = isAct && chalDone;
                  return (
                    <div key={ch.id} style={{
                      padding:"12px 14px", borderBottom:"1px solid " + P.border,
                      background: isAct ? "rgba(200,120,32,.05)" : "transparent",
                    }}>
                      <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                        <span style={{ fontSize:28, lineHeight:1, flexShrink:0, marginTop:2 }}>{ch.emoji}</span>
                        <div style={{ flex:1 }}>
                          <div style={{
                            fontFamily:"'Jost',sans-serif", fontSize:12,
                            color: isDone ? P.greenLt : P.text, letterSpacing:.4, marginBottom:2,
                          }}>{isDone ? "* " : ""}{ch.name}</div>
                          <div style={{ fontSize:10, color:P.textMd, fontStyle:"italic", marginBottom:5 }}>{ch.flavor}</div>
                          <div style={{ fontSize:10, color:P.textDk, lineHeight:1.6, marginBottom:6 }}>{ch.story}</div>
                          <div style={{ fontSize:9, color:P.amber, fontStyle:"italic", marginBottom:8 }}>Hint: {ch.tip}</div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>
                            {ch.required.map((rid) => {
                              const t = TRAITS.find((x) => x.id === rid);
                              return t ? (
                                <div key={rid} style={{
                                  padding:"2px 7px", borderRadius:10,
                                  border:"1px solid " + P.border,
                                  fontSize:8, color:P.textMd,
                                }}>{t.emoji} {t.name}</div>
                              ) : null;
                            })}
                          </div>
                          {isDone ? (
                            <div style={{ fontSize:10, color:P.greenLt, fontFamily:"'Jost',sans-serif" }}>
                              Challenge Complete!
                            </div>
                          ) : (
                            <button className="mw-btn" onClick={() => startChallenge(ch)} style={{
                              padding:"5px 16px",
                              border:"1px solid " + (isAct ? P.gold : P.border),
                              borderRadius:3,
                              background: isAct ? "rgba(196,154,44,.12)" : "rgba(255,255,255,.03)",
                              color: isAct ? P.goldLt : P.textMd,
                              fontSize:8, letterSpacing:1, fontFamily:"'Jost',sans-serif",
                            }}>{isAct ? "IN PROGRESS" : "ATTEMPT"}</button>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ══ WIN OVERLAY ══ */}
        {showWin && (
          <div onClick={() => setShowWin(false)} style={{
            position:"fixed", inset:0, zIndex:500,
            background:"rgba(7,6,15,.93)",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>
            <div style={{
              background:P.panel, border:"2px solid " + P.gold,
              borderRadius:12, padding:"30px 44px",
              textAlign:"center", position:"relative",
              animation:"mwWin .45s cubic-bezier(.34,1.56,.64,1)",
            }}>
              <Corners active={true} />
              <div style={{ fontSize:52, lineHeight:1 }}>{challenge ? challenge.emoji : ""}</div>
              <div style={{
                fontFamily:"'Jost',sans-serif", fontSize:17,
                color:P.goldLt, marginTop:12, letterSpacing:2,
              }}>CREATURE FORGED</div>
              <div style={{ fontSize:12, color:P.textMd, marginTop:5, fontStyle:"italic" }}>
                {challenge ? challenge.name : ""} enters the dungeon
              </div>
              <div style={{ marginTop:6, fontSize:8, color:P.textDk, fontFamily:"monospace" }}>
                tap to continue
              </div>
            </div>
          </div>
        )}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<MonsterWorkshop />);
  </script>
</body>
</html>
