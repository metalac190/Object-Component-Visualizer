           Modals live OUTSIDE mw-root so fixed positioning works correctly. */
        .mw-root{font-family:'Jost',sans-serif;}
        @media(min-width:600px) and (max-width:1199px){
          .mw-root{zoom:1.3; height:calc(100vh / 1.3) !important; max-height:calc(100vh / 1.3) !important;}

        @keyframes mwModalIn   {from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

      "Each one built from the same small set of components.",
      "None of them required a new class or a special type.",
    ],
  },
  {
    title:"THAT IS THE POWER.",
    visual:"title",
    lines:[
      "You are no longer thinking in single, monolithic objects.",
      "You are thinking in behaviors — and combinations of behaviors.",
      "This is how modern game engines are built.",
      "This is how you will build your scripts.",
    ],
    isLast:true,
  },
];

function Corners({ active }) {
  const col = active ? P.goldLt : P.goldDim;
  const defs = [
    { top:-1,    left:-1,  borderTop:"1.5px solid",    borderLeft:"1.5px solid"   },
    { top:-1,    right:-1, borderTop:"1.5px solid",    borderRight:"1.5px solid"  },
    { bottom:-1, left:-1,  borderBottom:"1.5px solid", borderLeft:"1.5px solid"   },
    { bottom:-1, right:-1, borderBottom:"1.5px solid", borderRight:"1.5px solid"  },
  ];
  return (
    <>
      {defs.map((s, i) => (
        <div key={i} style={{ position:"absolute", width:8, height:8, borderColor:col, ...s }} />
      ))}
    </>
  );
}

// Panel accepts sx for flex-sizing from parent layout
function Panel({ title, right, children, isDrop, containerRef, sx }) {
  return (
    <div
      ref={containerRef}
      style={{
        position:"relative", display:"flex", flexDirection:"column",
        border:"1px solid " + (isDrop ? P.goldLt : P.border),
        background: isDrop ? P.drop : P.panel,
        transition:"border-color .12s, background .12s",
        overflow:"hidden", minHeight:0,
        ...sx,
      }}
    >
      <Corners active={isDrop} />
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"3px 8px", minHeight:22,
        borderBottom:"1px solid " + P.border, background:P.panelB, flexShrink:0,
      }}>
        <span style={{
          fontFamily:"'Jost',sans-serif", fontSize:11, letterSpacing:2,
          color: isDrop ? P.goldLt : P.gold, fontWeight:700, userSelect:"none",
        }}>{title}</span>
        {right}
      </div>
      <div style={{ flex:1, overflow:"auto", position:"relative" }}>
        {children}
        {isDrop && (
          <div style={{
            position:"absolute", inset:0, pointerEvents:"none",
            display:"flex", alignItems:"center", justifyContent:"center",
            background:"rgba(7,6,15,.48)",
          }}>
            <div style={{
              border:"1.5px dashed " + P.gold, borderRadius:4,
              padding:"5px 14px", color:P.goldLt,
              fontSize:8, letterSpacing:2, fontFamily:"'Jost',sans-serif",
              background:"rgba(7,6,15,.9)",
              animation:"mwGlow 1s ease-in-out infinite",
            }}>DROP TO ATTACH</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── GRIP ICON ────────────────────────────────────────────────────────────────
// 2×3 dot grid rendered in the drag handle strip
function GripDots() {
  return (
    <div style={{
      display:"grid", gridTemplateColumns:"repeat(2,4px)", gap:"4px",
      opacity:.5,
    }}>
      {[0,1,2,3,4,5].map((i) => (
        <div key={i} style={{
          width:3.5, height:3.5, borderRadius:"50%",
          background:P.amber,
        }} />
      ))}

}

// ─── GAME VIEW — LIVE SIMULATION ─────────────────────────────────────────────
// Room shape (SVG viewBox 0-100 units, maps to % of container)
const ROOM_PTS  = "6,8 94,8 94,28 100,28 100,72 94,72 94,92 70,92 70,100 30,100 30,92 6,92 6,72 0,72 0,28 6,28";
const WALK_RECTS = [
  [0.06,0.08,0.94,0.92],
  [0.00,0.28,0.06,0.72],
  [0.94,0.28,1.00,0.72],
  [0.30,0.92,0.70,1.00],
];
const DUMMY_HOME = [
  { id:0, nx:0.22, ny:0.25 },
  { id:1, nx:0.82, ny:0.50 },
  { id:2, nx:0.45, ny:0.78 },
];
const DUM_MAX_HP = 5;
function inRoom(nx, ny) {
  return WALK_RECTS.some(([x1,y1,x2,y2]) => nx>=x1&&nx<=x2&&ny>=y1&&ny<=y2);
}

function GameView({ attached, params }) {
  const paramsRef = useRef(params);
  useEffect(() => { paramsRef.current = params; });

  const gsRef  = useRef(null);
  const rafRef = useRef(null);
  const [rs, setRs] = useState(null);

  const has = useCallback((id) => attached.some(t => t.id === id), [attached]);
  const gp  = useCallback((id, k, def) => {
    const p = paramsRef.current;
    return (p[id] && p[id][k] != null) ? p[id][k] : def;
  }, []);

  const attachedKey = attached.map(t=>t.id).sort().join(",");

  useEffect(() => {
    // Initialise fresh game state whenever component set changes
    const mhp = has("hp") ? gp("hp","maxHp",3)*20 : Infinity;
    gsRef.current = {
      e: { nx:0.5, ny:0.5, hp:mhp, maxHp:mhp,
           dead:false, deadTimer:0, atkTimer:0, spellTimer:0, projTimer:0,
           wandTimer:0, wandTarget:{nx:0.5,ny:0.5} },
      dummies: DUMMY_HOME.map(d=>({...d,hp:DUM_MAX_HP,maxHp:DUM_MAX_HP,state:"alive",respTimer:0,hit:0})),
      proj:[],
      swing:null, spell:null, voice:null,
      floatTexts:[], _fid:0,
    };

    let last = 0;
    const tick = (t) => {
      rafRef.current = requestAnimationFrame(tick);
      const dt = Math.min((t-last)/1000, 0.05);
      last = t;
      if (dt <= 0) return;
      const gs = gsRef.current;
      const e  = gs.e;

      // Read component flags fresh each frame (closures over latest attached/params via ref)
      const hasMove   = has("move");
      const hasBrain  = has("brain");
      const hasMelee  = has("melee");
      const hasRanged = has("ranged");
      const hasMagic  = has("magic");
      const hasSight  = has("sight");
      const hasHp_    = has("hp");
      const hasArmor  = has("armor");
      const hasVoice  = has("voice");
      const hasElem   = has("element");

      // Helper: spawn a floating damage number
      const spawnFloat = (nx, ny, val, type) => {
        if (val < 0.5) return;
        gs.floatTexts.push({
          id: gs._fid++,
          nx: nx + (Math.random()-0.5)*0.06,
          ny: ny - 0.03,
          text: Math.max(1, Math.round(val)).toString(),
          type,
          age: 0,
        });
      };
      const elemBonus = hasElem ? gp("element","intensity",5)*0.8 : 0;

      const spd       = hasMove   ? gp("move",   "speed",    5)*0.05           : 0;
      const detR      = hasSight  ? gp("sight",  "range",    5)*0.09           : 0.38;
      const meleeDist = hasMelee  ? gp("melee",  "range",    3)*0.012 + 0.04   : 0.10;
      const atkCd     = hasMelee  ? 2.2/Math.max(0.5,gp("melee","fireRate",4)) : 999;
      const mDmg      = hasMelee  ? gp("melee",  "damage",   5)*1.5            : 0;
      const spellCd   = hasMagic  ? 2.5/Math.max(0.5,gp("magic","fireRate",3)) : 999;
      const spellR    = hasMagic  ? gp("magic",  "range",    4)*0.035 + 0.06   : 0.22;
      const spellDmg  = hasMagic  ? gp("magic",  "power",    8)*0.25            : 0;
      const projCd    = hasRanged ? 2.2/Math.max(0.5,gp("ranged","fireRate",3)) : 999;
      const projR     = hasRanged ? gp("ranged", "range",    5)*0.07 + 0.10     : detR;
      const projSpd   = hasRanged ? gp("ranged", "projSpeed",7)*0.18            : 0;
      const projDmg   = hasRanged ? gp("ranged", "damage",   4)*1.2             : 0;

      // Dead → respawn
      if (e.dead) {
        e.deadTimer -= dt;
        if (e.deadTimer <= 0) {
          const mh = hasHp_ ? gp("hp","maxHp",3)*20 : Infinity;
          Object.assign(e,{nx:0.5,ny:0.5,hp:mh,maxHp:mh,dead:false,atkTimer:0,spellTimer:0,projTimer:0,wandTimer:0});
        }
      } else {
        // Dummies passively damage entity when adjacent
        if (hasHp_) {
          gs.dummies.forEach(d => {
            if (d.state !== "alive") return;
            const dx=d.nx-e.nx, dy=d.ny-e.ny;
            if (Math.sqrt(dx*dx+dy*dy) < meleeDist+0.04)
              e.hp -= (hasArmor ? 0.8 : 2.5)*dt;
          });
          if (e.hp <= 0) { e.dead=true; e.deadTimer=3.5; }
        }

        // Nearest alive dummy
        let nd=null, ndist=Infinity;
        gs.dummies.forEach(d => {
          if (d.state !== "alive") return;
          const dx=d.nx-e.nx, dy=d.ny-e.ny;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if (dist<ndist) { ndist=dist; nd=d; }
        });

        // Movement / AI
        if (hasBrain && hasMove && nd && ndist<detR) {
          // Brain + Move: chase target
          const dx=nd.nx-e.nx, dy=nd.ny-e.ny;
          if (ndist>meleeDist) {
            const nx_=e.nx+(dx/ndist)*spd*dt;
            const ny_=e.ny+(dy/ndist)*spd*dt;
            if (inRoom(nx_,ny_)) { e.nx=nx_; e.ny=ny_; }
          }
        } else if (hasMove) {
          // No brain (or no target in range): wander
          e.wandTimer -= dt;
          if (e.wandTimer<=0) {
            e.wandTimer = 1.5+Math.random()*2;
            let wx,wy,att=0;
            do { wx=0.07+Math.random()*0.86; wy=0.1+Math.random()*0.82; att++; }
            while (!inRoom(wx,wy) && att<20);
            e.wandTarget = {nx:wx,ny:wy};
          }
          const dx=e.wandTarget.nx-e.nx, dy=e.wandTarget.ny-e.ny;
          const d=Math.sqrt(dx*dx+dy*dy);
          if (d>0.025) {
            const nx_=e.nx+(dx/d)*spd*0.55*dt;
            const ny_=e.ny+(dy/d)*spd*0.55*dt;
            if (inRoom(nx_,ny_)) { e.nx=nx_; e.ny=ny_; }
          }
        }

        // Melee — fires whenever a dummy is in range, independent of brain
        if (hasMelee && nd && ndist < meleeDist+0.02) {
          e.atkTimer -= dt;
          if (e.atkTimer <= 0) {
            e.atkTimer = atkCd;
            const dx=nd.nx-e.nx, dy=nd.ny-e.ny;
            nd.hp = Math.max(0, nd.hp-mDmg);
            nd.hit = 0.35;
            spawnFloat(nd.nx, nd.ny, mDmg, "normal");
            if (hasElem) {
              nd.hp = Math.max(0, nd.hp-elemBonus);
              spawnFloat(nd.nx+0.04, nd.ny-0.04, elemBonus, "element");
            }
            gs.swing = { nx:e.nx, ny:e.ny, angle:Math.atan2(dy, dx), t:0.22 };
            if (hasVoice) gs.voice = { t:0.65 };
            if (nd.hp<=0) { nd.state="dead"; nd.respTimer=3; }
          }
        }

        // Ranged attack — own timer, own range, fires independently of melee
        if (hasRanged && nd && ndist > meleeDist && ndist < projR) {
          e.projTimer = (e.projTimer || 0) - dt;
          if (e.projTimer <= 0) {
            e.projTimer = projCd;
            const dx=nd.nx-e.nx, dy=nd.ny-e.ny;
            gs.proj.push({nx:e.nx,ny:e.ny,vx:(dx/ndist)*projSpd,vy:(dy/ndist)*projSpd,tid:nd.id,life:2.5});
          }
        }

        // Spell AoE
        if (hasMagic) {
          e.spellTimer -= dt;
          if (e.spellTimer<=0) {
            e.spellTimer = spellCd;
            gs.spell = { nx:e.nx, ny:e.ny, t:0.8, r:spellR };
            gs.dummies.forEach(d => {
              if (d.state!=="alive") return;
              const dx=d.nx-e.nx, dy=d.ny-e.ny;
              if (Math.sqrt(dx*dx+dy*dy)<spellR) {
                d.hp=Math.max(0,d.hp-spellDmg); d.hit=0.35;
                spawnFloat(d.nx, d.ny, spellDmg, "spell");
                if (d.hp<=0){d.state="dead";d.respTimer=3;}
              }
            });
          }
        }
      }

      // Update projectiles
      gs.proj = gs.proj.filter(p => {
        p.nx+=p.vx*dt; p.ny+=p.vy*dt; p.life-=dt;
        if (p.life<=0||!inRoom(p.nx,p.ny)) return false;
        const tgt=gs.dummies.find(d=>d.id===p.tid&&d.state==="alive");
        if (tgt) {
          const dx=tgt.nx-p.nx, dy=tgt.ny-p.ny;
          if (Math.sqrt(dx*dx+dy*dy)<0.06) {
            tgt.hp=Math.max(0,tgt.hp-projDmg); tgt.hit=0.35;
            spawnFloat(tgt.nx, tgt.ny, projDmg, "ranged");
            if (hasElem) {
              tgt.hp=Math.max(0,tgt.hp-elemBonus);
              spawnFloat(tgt.nx+0.04, tgt.ny-0.04, elemBonus, "element");
            }
            if(tgt.hp<=0){tgt.state="dead";tgt.respTimer=3;}
            return false;
          }
        }
        return true;
      });

      // Update dummies
      gs.dummies.forEach(d => {
        d.hit=Math.max(0,(d.hit||0)-dt*3);
        if (d.state==="dead"){d.respTimer-=dt; if(d.respTimer<=0){d.hp=d.maxHp;d.state="alive";}}
      });

      // Decay effects
      if (gs.swing){gs.swing.t-=dt; if(gs.swing.t<=0)gs.swing=null;}
      if (gs.spell){gs.spell.t-=dt; if(gs.spell.t<=0)gs.spell=null;}
      if (gs.voice){gs.voice.t-=dt; if(gs.voice.t<=0)gs.voice=null;}

      // Age float texts — remove after 1.1 seconds
      gs.floatTexts.forEach(ft => { ft.age += dt; });
      gs.floatTexts = gs.floatTexts.filter(ft => ft.age < 1.1);

      // Snapshot for React render
      setRs({
        e:      {...e},
        dummies: gs.dummies.map(d=>({...d})),
        proj:    gs.proj.map(p=>({...p})),
        swing:  gs.swing  ? {...gs.swing}  : null,
        spell:  gs.spell  ? {...gs.spell}  : null,
        voice:  gs.voice  ? {...gs.voice}  : null,
        floatTexts: gs.floatTexts.map(ft=>({...ft})),
      });
    };

    rafRef.current = requestAnimationFrame(tick);
    return () => { if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [attachedKey]);

  const hasForm   = has("form");
  const hasHp     = has("hp");
  const hasBrainR = has("brain");
  const hasArmorR = has("armor");
  const hasElemR  = has("element");
  const hasMeleeR = has("melee");
  const meleeDist = hasMeleeR
    ? (((params["melee"] && params["melee"]["range"] != null) ? params["melee"]["range"] : 3) * 0.012 + 0.04)
    : 0.10;
  const pc = (n) => (n*100)+"%";

  return (
    <div style={{width:"100%",height:"100%",position:"relative",background:"#08050e",overflow:"hidden"}}>


      {/* ── Static room ── */}
      <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"
        style={{position:"absolute",inset:0,zIndex:1}}>
        <defs>
          <pattern id="rg" width="8" height="8" patternUnits="userSpaceOnUse">
            <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(70,50,90,.12)" strokeWidth=".4"/>
          </pattern>
        </defs>
        <polygon points={ROOM_PTS} fill="rgba(18,12,28,.92)"/>
        <polygon points={ROOM_PTS} fill="url(#rg)"/>
        <polygon points={ROOM_PTS} fill="none" stroke="rgba(110,80,150,.38)" strokeWidth="1.5"/>
      </svg>

      {/* ── Dynamic effects (SVG overlay) ── */}
      {rs && (
        <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"
          style={{position:"absolute",inset:0,zIndex:6,pointerEvents:"none"}}>
          {/* Melee range ring — faded red, always visible when melee attached */}
          {hasMeleeR && !rs.e.dead && (
            <ellipse cx={rs.e.nx*100} cy={rs.e.ny*100}
              rx={meleeDist*100+2} ry={meleeDist*100+2}
              fill="rgba(180,40,40,.06)" stroke="rgba(200,60,60,.22)" strokeWidth="1"
              strokeDasharray="2,2"/>
          )}
          {/* Detection ring */}
          {has("sight") && !rs.e.dead && (
            <ellipse cx={rs.e.nx*100} cy={rs.e.ny*100}
              rx={has("sight")?gp("sight","range",5)*9:36}
              ry={has("sight")?gp("sight","range",5)*9:36}
              fill="none" stroke="rgba(216,190,50,.11)" strokeWidth="1" strokeDasharray="2,3"/>
          )}
          {/* Spell AoE ring */}
          {rs.spell && (
            <ellipse cx={rs.spell.nx*100} cy={rs.spell.ny*100} rx={(rs.spell.r||0.22)*100} ry={(rs.spell.r||0.22)*100}
              fill="rgba(130,60,220,.07)" stroke="rgba(170,100,255,.75)" strokeWidth="1.5"
              opacity={Math.min(1,rs.spell.t*1.5)}/>
          )}
          {/* Attack swing */}
          {rs.swing && (
            <line
              x1={rs.swing.nx*100} y1={rs.swing.ny*100}
              x2={(rs.swing.nx+Math.cos(rs.swing.angle)*0.13)*100}
              y2={(rs.swing.ny+Math.sin(rs.swing.angle)*0.13)*100}
              stroke="rgba(230,210,100,.95)" strokeWidth="2.5" strokeLinecap="round"
              opacity={Math.min(1,rs.swing.t*5)}/>
          )}
          {/* Voice ripples */}
          {rs.voice && !rs.e.dead && [0,1,2].map(i=>(
            <circle key={i} cx={rs.e.nx*100} cy={rs.e.ny*100} r={7+i*8}
              fill="none" stroke="rgba(200,130,50,.55)" strokeWidth="1"
              opacity={Math.max(0,(rs.voice.t-i*0.18)*1.6)}/>
          ))}
        </svg>
      )}

      {/* ── Entity ── */}
      {rs && !rs.e.dead && (() => {
        const spriteId  = gp("form", "sprite", "abstract");
        const spriteData = SPRITES.find(s => s.id === spriteId);
        const useEmoji  = hasForm && spriteData && spriteData.emoji;
        const scale     = hasForm ? gp("form","scale",10)/10 : 1;
        const opacity   = hasForm ? gp("form","opacity",100)/100 : 1;
        const emojiSize = Math.round(36 * scale);
        const hpBarW    = useEmoji ? Math.max(36, emojiSize) : 36;
        return (
          <div style={{position:"absolute",left:pc(rs.e.nx),top:pc(rs.e.ny),
            transform:"translate(-50%,-50%)",zIndex:10,pointerEvents:"none"}}>
            {/* AI Brain: spinning arc above entity — outer div positions, inner div spins */}
            {hasBrainR && !rs.e.dead && (
              <div style={{
                position:"absolute",
                left:"50%", top:"-22px",
                width:14, height:14,
                marginLeft:"-7px",
              }}>
                <div style={{
                  width:14, height:14,
                  borderRadius:"50%",
                  border:"2px solid rgba(120,180,255,.12)",
                  borderTopColor:"rgba(120,200,255,.9)",
                  borderRightColor:"rgba(120,200,255,.5)",
                  animation:"mwBrainSpin 0.9s linear infinite",
                }}/>
              </div>
            )}
            {/* Armor: rotating dashed ring — outer div positions, inner div spins */}
            {hasArmorR && !rs.e.dead && (
              <div style={{
                position:"absolute",
                left:"50%", top:"50%",
                width: (useEmoji ? Math.max(36,emojiSize) : 28) + 16,
                height:(useEmoji ? Math.max(36,emojiSize) : 28) + 16,
                marginLeft: -((useEmoji ? Math.max(36,emojiSize) : 28) + 16) / 2,
                marginTop:  -((useEmoji ? Math.max(36,emojiSize) : 28) + 16) / 2,
                pointerEvents:"none",
              }}>
                <div style={{
                  width:"100%", height:"100%",
                  borderRadius:"50%",
                  border:"1.5px dashed rgba(200,210,225,.5)",
                  boxSizing:"border-box",
                  animation:"mwArmorSpin 3.5s linear infinite",
                }}/>
              </div>
            )}
            {/* Health bar */}
            {hasHp && rs.e.maxHp<Infinity && (
              <div style={{position:"absolute",bottom:"calc(100% + 3px)",left:"50%",
                transform:"translateX(-50%)",width:hpBarW}}>
                <div style={{height:3,background:"rgba(40,15,15,.9)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",
                    width:Math.max(0,rs.e.hp/rs.e.maxHp*100)+"%",
                    background:"#c85050",borderRadius:2,transition:"width .08s"}}/>
                </div>
              </div>
            )}
            {/* Body — emoji sprite or blue circle, with elemental pulse on sprite itself */}
            <div style={{ position:"relative" }}>
            {useEmoji ? (
              <span style={{
                fontSize: emojiSize,
                lineHeight: 1,
                display: "block",
                opacity: opacity,
                filter: hasForm ? "drop-shadow(0 0 4px rgba(80,110,230,.55))" + (hasElemR ? " drop-shadow(0 0 8px rgba(255,100,20,.7))" : "") : "none",
                userSelect: "none",
                transition: "font-size .25s, opacity .25s",
                animation: hasElemR && !rs.e.dead ? "mwElemPulse 1.2s ease-in-out infinite" : "none",
                display:"block", transformOrigin:"center center",
              }}>{spriteData.emoji}</span>
            ) : (
              <div style={{
                width:28, height:28, borderRadius:"50%",
                background:hasForm?"linear-gradient(135deg,#2838b0,#18206a)":"rgba(50,60,140,.18)",
                border:hasForm?"2px solid rgba(110,140,255,.88)":"1.5px dashed rgba(110,140,255,.28)",
                boxShadow:hasForm?"0 0 10px rgba(80,110,230,.65)":"none",
                animation: hasElemR && !rs.e.dead ? "mwElemPulse 1.2s ease-in-out infinite" : "none",
                transformOrigin:"center center",
              }}/>
            )}
            </div>
          </div>
        );
      })()}

      {/* ── Dummies ── */}
      {rs && rs.dummies.map(d=>(
        <div key={d.id} style={{position:"absolute",left:pc(d.nx),top:pc(d.ny),
          transform:"translate(-50%,-50%)",zIndex:8,pointerEvents:"none",
          opacity:d.state==="dead"?0.1:1,transition:"opacity .35s"}}>
          {d.state==="alive" && (
            <div style={{position:"absolute",bottom:"calc(100% + 3px)",left:"50%",
              transform:"translateX(-50%)",width:32}}>
              <div style={{height:2.5,background:"rgba(15,35,15,.9)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:(d.hp/d.maxHp*100)+"%",
                  background:"#60b870",borderRadius:2,transition:"width .08s"}}/>
              </div>
            </div>
          )}
          <div style={{
            width:22,height:22,borderRadius:3,
            background:d.hit>0?"rgba(210,90,40,.95)":"rgba(70,55,25,.9)",
            border:"1.5px solid "+(d.hit>0?"rgba(255,150,70,.95)":"rgba(150,130,50,.5)"),
            transition:"background .05s",
          }}/>
        </div>
      ))}

      {/* ── Projectiles ── */}
      {rs && rs.proj.map((p,i)=>(
        <div key={i} style={{position:"absolute",zIndex:11,
          left:pc(p.nx),top:pc(p.ny),transform:"translate(-50%,-50%)",
          width:5,height:5,borderRadius:"50%",
          background:"rgba(245,215,80,.95)",
          boxShadow:"0 0 5px rgba(245,215,80,.7)",
          pointerEvents:"none"}}/>
      ))}

      {/* ── Floating combat text ── */}
      {rs && rs.floatTexts && rs.floatTexts.map(ft => {
        const t = ft.age / 1.1;                        // 0→1 over lifetime
        // Pop-in: 0→0.12 scale up, 0.12→0.22 slight overshoot settle
        const scale = t < 0.12 ? 0.4 + (t/0.12)*1.1
                    : t < 0.22 ? 1.5 - ((t-0.12)/0.10)*0.5
                    : 1.0;
        // Opacity: fade in fast, stay, fade out last 40%
        const opacity = t < 0.15 ? t/0.15
                      : t < 0.62 ? 1
                      : 1 - ((t-0.62)/0.38);
        const floatPx = t * -28;                       // drift up 28px over lifetime

        const COLOR = {
          normal:  "rgba(255,255,255,0.97)",
          element: "#ff8c30",                          // fire orange
          spell:   "rgba(210,130,255,0.97)",           // arcane purple
          ranged:  "rgba(245,215,80,0.97)",            // arrow yellow
        };

        return (
          <div key={ft.id} style={{
            position:"absolute", zIndex:20, pointerEvents:"none",
            left:pc(ft.nx), top:pc(ft.ny),
            transform:`translate(-50%, calc(-50% + ${floatPx}px)) scale(${scale.toFixed(3)})`,
            color: COLOR[ft.type] || COLOR.normal,
            fontSize: ft.type==="element" ? 10 : 12,
            fontWeight: 700,
            fontFamily: "'Jost', sans-serif",
            letterSpacing: 0.5,
            textShadow: "0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6)",
            opacity: Math.max(0, opacity),
            userSelect: "none",
          }}>{ft.text}</div>
        );
      })}

      {/* ── Empty hint ── */}
      {attached.length===0 && (
        <div style={{position:"absolute",inset:0,display:"flex",
          alignItems:"center",justifyContent:"center",pointerEvents:"none",zIndex:15}}>
          <div style={{fontSize:8,color:"rgba(120,90,150,.38)",
            fontFamily:"monospace",letterSpacing:2,textAlign:"center"}}>
            EMPTY ENTITY<br/>add components
          </div>
        </div>
      )}
    </div>
  );
}



// ─── SLIDER ROW ───────────────────────────────────────────────────────────────
// Uses plain block-level divs (not flex-column) so stacking is guaranteed on
// every mobile browser. Block divs always stack vertically — no layout ambiguity.
function SliderRow({ slider, value, onChange }) {
  const displayVal = Number.isInteger(slider.step)
    ? Math.round(value)
    : value.toFixed(1);
  const unitStr = slider.unit ? " " + slider.unit : "";
  return (
    <div style={{ width:"100%", padding:"4px 0 7px" }}>
      {/* Header: label + current value side by side */}
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
        <span style={{ fontSize:7.5, color:P.textMd, fontFamily:"monospace" }}>
          {slider.label}
        </span>
        <span style={{ fontSize:7.5, color:P.amber, fontFamily:"monospace" }}>
          {displayVal}{unitStr}
        </span>
      </div>
      {/* Slider: its own block-level div forces a new line */}
      <div style={{ width:"100%", marginBottom:4 }}>
        <input
          type="range"
          min={slider.min} max={slider.max} step={slider.step}
          value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="mw-slider"
          style={{ display:"block", width:"100%", cursor:"pointer" }}
        />
      </div>
      {/* Range hint labels */}
      <div style={{ display:"flex", justifyContent:"space-between" }}>
        <span style={{ fontSize:5.5, color:P.textDk, fontFamily:"monospace" }}>
          {slider.min}{unitStr}
        </span>
        <span style={{ fontSize:5.5, color:P.textDk, fontFamily:"monospace" }}>
          {slider.max}{unitStr}
        </span>
      </div>
    </div>
  );
}

// ─── INTRO SCREEN ─────────────────────────────────────────────────────────────
function IntroScreen({ onComplete }) {
  const [step, setStep]              = useState(0);
  const [revealedChars, setRevealed] = useState(0);
  // phase: "in" = visible, "out" = fading out, "gap" = black hold
  const [phase, setPhase]            = useState("in");
  const [pendingStep, setPendingStep]= useState(null);

  const slide      = INTRO_SLIDES[step];
  const flatText   = slide.lines.join("\n");
  const totalChars = flatText.length;
  const isTextDone = revealedChars >= totalChars;
  const isLast     = !!slide.isLast;
  const isVisible  = phase === "in";

  // Char-by-char timer — only when phase is "in"
  useEffect(() => {
    if (phase !== "in") return;
    if (revealedChars >= totalChars) return;
    const t = setTimeout(() => setRevealed((r) => r + 1), 28);
    return () => clearTimeout(t);
  }, [revealedChars, totalChars, phase]);


  // When a pendingStep is set: out → gap → switch + in
  // Use slower, more dramatic timing for the Unit Builder title slide
  useEffect(() => {
    if (pendingStep === null) return;
    const goingToUB = false;
    const outDur  = goingToUB ? 600  : 250;
    const gapDur  = goingToUB ? 500  : 150;
    setPhase("out");
    const t1 = setTimeout(() => {
      setPhase("gap");
      const t2 = setTimeout(() => {
        setStep(pendingStep);
        setRevealed(0);
        setPendingStep(null);
        setPhase("in");
      }, gapDur);
      return () => clearTimeout(t2);
    }, outDur);
    return () => clearTimeout(t1);
  }, [pendingStep]);

  const handleBtn = () => {
    if (phase !== "in") return;        // ignore taps during transition
    if (!isTextDone) {
      setRevealed(totalChars);
    } else if (isLast) {
      onComplete();
    } else {
      setPendingStep(step + 1);
    }
  };

  // Build character tokens.
  // `domKey`   — includes step so React always creates fresh DOM nodes on slide change (no inherited opacity)
  // `revealIdx` — simple 0-based index used for the revealedChars comparison
  const tokens = [];
  let gi = 0;
  flatText.split("\n").forEach((line, li, arr) => {
    [...line].forEach((ch) => {
      tokens.push({ domKey: step + "-" + gi, revealIdx: gi, ch, isNewline: false });
      gi++;
    });
    if (li < arr.length - 1) {
      tokens.push({ domKey: step + "-" + gi, revealIdx: gi, ch: "\n", isNewline: true });
      gi++;
    }
  });

  return (
    <div
      onClick={handleBtn}
      style={{
        position:"fixed", inset:0, zIndex:2000,
        background:"#040210",
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"flex-start",
        padding:"5vh 24px 28px",
        overflow:"auto",
        touchAction:"manipulation",
        userSelect:"none",
        cursor:"default",
      }}
    >
      {/* Dots row with back arrow — hidden on Unit Builder title slide */}
      <div style={{
        display:"flex", alignItems:"center", gap:10, marginBottom:"2vh",
        width:"100%", maxWidth:340, justifyContent:"center", position:"relative",
        opacity: 1,
        transition:"opacity .4s",
      }}>
        {/* Back arrow */}
        <button
          className="mw-btn"
          onClick={(e) => {
            e.stopPropagation();
            if (step > 0 && phase === "in") setPendingStep(step - 1);
          }}
          style={{
            position:"absolute", left:0,
            fontSize:22, fontWeight:700, lineHeight:1,
            color: step > 0 && phase === "in" ? "rgba(255,255,255,.65)" : "transparent",
            transition:"color .3s",
            padding:"4px 6px",
            pointerEvents: step > 0 && phase === "in" ? "auto" : "none",
          }}
        >{"<"}</button>

        {/* Progress dots — exclude the Unit Builder title slide */}
        <div style={{ display:"flex", gap:6 }}>
          {INTRO_SLIDES.slice(0, -1).map((_, i) => (
            <div key={i} style={{
              height:4, borderRadius:2,
              width: i === step ? 18 : 5,
              background: i < step ? P.amber : i === step ? P.goldLt : P.border,
              transition:"all .3s",
            }} />
          ))}
        </div>
      </div>

      {/* Whole-slide fade wrapper — visual + title + text all fade together */}
      <div style={{
        display:"flex", flexDirection:"column", alignItems:"center", width:"100%",
        opacity: phase === "in" ? 1 : 0,
        transition: phase === "out" ? "opacity 0.22s ease-in" : phase === "in" ? "opacity 0.28s ease-out" : "none",
        pointerEvents: phase === "in" ? "auto" : "none",
      }}>
        {/* Visual */}
        <div style={{
          display:"flex", alignItems:"center", justifyContent:"center",
          marginBottom:"2vh", minHeight:155,
        }}>
          <IntroVisual slide={slide} compCount={slide.showComps} />
        </div>

        {/* Title — larger on title and unitbuilder slides */}
        <div key={"t-" + step} style={{
          fontSize: slide.id === "title" ? 36 : 22,
          fontWeight:700, color:P.goldLt,
          letterSpacing: 1.5,
          textAlign:"center",
          marginBottom:"1.5vh", whiteSpace:"pre-line",
          animation: phase === "in" ? "mwIntroSlideUp .28s ease" : "none",
        }}>{slide.title}</div>

        {/* Body text — char-by-char opacity transition */}
        <div style={{ maxWidth:340, width:"100%", marginBottom:"2.5vh", minHeight: slide.lines.length > 0 ? 80 : 0 }}>
          <div style={{ fontSize:17, color:P.textMd, lineHeight:1.85 }}>
            {tokens.map((tok) => {
              const visible = tok.revealIdx < revealedChars;
              if (tok.isNewline) return visible ? <br key={tok.domKey} /> : <span key={tok.domKey} />;
              return (
                <span key={tok.domKey} style={{ opacity: visible ? 1 : 0, transition:"opacity 0.55s ease-out" }}>
                  {tok.ch}
                </span>
              );
            })}
          </div>
        </div>

        {/* Triangle "tap to continue" — visible when text done */}
        <div style={{
          marginTop:18,
          display:"flex", justifyContent:"center",
          pointerEvents:"none",
          opacity: isTextDone && phase === "in" ? 1 : 0,
          transition:"opacity 0.7s ease",
        }}>
          <div style={{
            width:0, height:0,
            borderTop:"8px solid transparent",
            borderBottom:"8px solid transparent",
            borderLeft:"13px solid rgba(255,255,255,0.78)",
            animation: isTextDone && phase === "in" ? "mwTriBounce 1.15s ease-in-out infinite" : "none",
            filter:"drop-shadow(0 0 3px rgba(255,255,255,0.25))",
          }} />
        </div>
      </div>
    </div>
  );
}



// ─── OUTRO SCREEN ─────────────────────────────────────────────────────────────
function OutroScreen({ onPlayAgain, onFreeform }) {
  const [step, setStep]              = useState(0);
  const [revealedChars, setRevealed] = useState(0);
  const [phase, setPhase]            = useState("in");
  const [pendingStep, setPendingStep]= useState(null);
  const [ending, setEnding]          = useState(false);
  const slide      = OUTRO_SLIDES[step];
  const flatText   = slide.lines.join("\n");
  const totalChars = flatText.length;
  const isTextDone = revealedChars >= totalChars;
  const isLast     = !!slide.isLast;

  useEffect(() => {
    if (phase !== "in" || revealedChars >= totalChars) return;
    const t = setTimeout(() => setRevealed(r => r + 1), 28);
    return () => clearTimeout(t);
  }, [revealedChars, totalChars, phase]);

  useEffect(() => {
    if (pendingStep === null) return;
    setPhase("out");
    const t1 = setTimeout(() => {
      setPhase("gap");
      const t2 = setTimeout(() => {
        setStep(pendingStep); setRevealed(0); setPendingStep(null); setPhase("in");
      }, 150);
      return () => clearTimeout(t2);
    }, 250);
    return () => clearTimeout(t1);
  }, [pendingStep]);

  const handleTap = () => {
    if (ending) return;
    if (phase !== "in") return;
    if (!isTextDone) { setRevealed(totalChars); }
    else if (isLast)  { setEnding(true); }
    else              { setPendingStep(step + 1); }
  };

  const tokens = [];
  let gi = 0;
  flatText.split("\n").forEach((line, li, arr) => {
    [...line].forEach(ch => { tokens.push({ domKey:step+"-"+gi, revealIdx:gi, ch, isNewline:false }); gi++; });
    if (li < arr.length - 1) { tokens.push({ domKey:step+"-"+gi, revealIdx:gi, ch:"\n", isNewline:true }); gi++; }
  });

  return (
    <div onClick={handleTap} style={{
      position:"fixed", inset:0, zIndex:2000, background:"#040210",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-start",
      padding:"5vh 24px 28px", overflow:"auto", touchAction:"manipulation", userSelect:"none",
    }}>
      {/* Permanent black fade overlay at end */}
      <div style={{
        position:"absolute", inset:0, background:"#000", zIndex:10,
        opacity: ending ? 1 : 0,
        transition: ending ? "opacity 2s ease-in" : "none",
        pointerEvents: ending ? "all" : "none",
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        gap:20,
      }}>
        {ending && (
          <>
            <div style={{
              fontSize:10, color:"rgba(255,255,255,.2)", fontFamily:"monospace",
              letterSpacing:3, marginBottom:24,
              animation:"mwModalIn 1.8s ease 1.2s both",
            }}>THE END</div>
            <div style={{
              maxWidth:320, textAlign:"center",
              animation:"mwModalIn 1s ease 2s both",
              marginBottom:18,
            }}>
              <div style={{ fontSize:16, fontWeight:700, color:P.goldLt, letterSpacing:.5, marginBottom:8 }}>
                NOW CREATE YOUR OWN
              </div>
              <div style={{ fontSize:14, color:P.textMd, lineHeight:1.8, marginBottom:14 }}>
                Try to design some behavior for one of these new unit types. Give it a name, decide what it does, and build it.
              </div>
              {/* New sprite cards */}
              <div style={{
                display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:16,
              }}>
                {SPRITES.filter(s => EXTRA_SPRITE_IDS.includes(s.id)).map(s => (
                  <div key={s.id} style={{
                    display:"flex", flexDirection:"column", alignItems:"center", gap:4,
                    padding:"8px 4px",
                    border:"1px solid rgba(240,200,74,.2)", borderRadius:6,
                    background:"rgba(240,200,74,.04)",
                  }}>
                    <span style={{ fontSize:22, lineHeight:1 }}>{s.emoji}</span>
                    <span style={{ fontSize:9, color:P.textDk, fontFamily:"monospace", letterSpacing:.5 }}>{s.label.toUpperCase()}</span>
                  </div>
                ))}
              </div>
              <div style={{ fontSize:11, color:P.textDk, fontStyle:"italic", lineHeight:1.7 }}>
                Try specific stat values for extra challenge.
              </div>
            </div>
            <button className="mw-btn" onClick={onFreeform} style={{
              padding:"11px 32px",
              border:"1.5px solid " + P.amber, borderRadius:6,

              color:P.goldLt, fontSize:14, letterSpacing:1.5, fontWeight:700,

          </>

      </div>
      {/* Dots */}
      <div style={{ display:"flex", gap:6, marginBottom:"2vh" }}>
        {OUTRO_SLIDES.map((_,i) => (
          <div key={i} style={{ height:4, borderRadius:2, width:i===step?18:5,
            background:i<step?P.amber:i===step?P.goldLt:P.border, transition:"all .3s" }} />
        ))}
      </div>
      <div style={{
        display:"flex", flexDirection:"column", alignItems:"center", width:"100%",
        opacity:phase==="in"?1:0,
        transition:phase==="out"?"opacity 0.22s ease-in":phase==="in"?"opacity 0.28s ease-out":"none",
        pointerEvents:phase==="in"?"auto":"none",
      }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", marginBottom:"2vh", minHeight:155 }}>
          <IntroVisual slide={slide} compCount={0} />
        </div>
        <div key={"ot-"+step} style={{ fontSize:22, fontWeight:700, color:P.goldLt, letterSpacing:1.5,
          textAlign:"center", marginBottom:"1.5vh", whiteSpace:"pre-line",
          animation:phase==="in"?"mwIntroSlideUp .28s ease":"none" }}>{slide.title}</div>
        <div style={{ maxWidth:340, width:"100%", marginBottom:"2.5vh", minHeight:80 }}>
          <div style={{ fontSize:17, color:P.textMd, lineHeight:1.85 }}>
            {tokens.map(tok => {
              const visible = tok.revealIdx < revealedChars;
              if (tok.isNewline) return visible ? <br key={tok.domKey}/> : <span key={tok.domKey}/>;
              return <span key={tok.domKey} style={{ opacity:visible?1:0, transition:"opacity 0.55s ease-out" }}>{tok.ch}</span>;
            })}
          </div>
        </div>
        <div style={{ marginTop:18, display:"flex", justifyContent:"center", pointerEvents:"none",
          opacity:isTextDone&&phase==="in"?1:0, transition:"opacity 0.7s ease" }}>
          <div style={{ width:0, height:0, borderTop:"8px solid transparent", borderBottom:"8px solid transparent",
            borderLeft:"13px solid rgba(255,255,255,0.78)",
            animation:isTextDone&&phase==="in"?"mwTriBounce 1.15s ease-in-out infinite":"none",
            filter:"drop-shadow(0 0 3px rgba(255,255,255,0.25))" }} />
        </div>
      </div>
    </div>
  );
}

  useEffect(() => {

              return <span key={tok.domKey} style={{ opacity:visible?1:0, transition:"opacity 0.55s ease-out" }}>{tok.ch}</span>;
            })}
          </div>
        </div>
        <div style={{ marginTop:18, display:"flex", justifyContent:"center", pointerEvents:"none",
