function Corners({ active }) {
  const col = active ? P.goldLt : P.goldDim;
  return [
    { top:-1,    left:-1,  borderTop:"1.5px solid",    borderLeft:"1.5px solid"   },
    { top:-1,    right:-1, borderTop:"1.5px solid",    borderRight:"1.5px solid"  },
    { bottom:-1, left:-1,  borderBottom:"1.5px solid", borderLeft:"1.5px solid"   },
    { bottom:-1, right:-1, borderBottom:"1.5px solid", borderRight:"1.5px solid"  },
  ].map((s, i) => (
    <div key={i} style={{ position:"absolute", width:8, height:8, borderColor:col, ...s }} />
  ));
}

// Panel accepts sx for flex-sizing from parent layout
function Panel({ title, right, children, isDrop, containerRef, sx }) {
  return (
    <div
      ref={containerRef}
      style={{
        position:"relative", display:"flex", flexDirection:"column",
        border:"1px solid " + (isDrop ? P.goldLt : P.border),
        background: isDrop ? P.drop : P.panel,
        transition:"border-color .12s, background .12s",
        overflow:"hidden", minHeight:0,
        ...sx,
      }}
    >
      <Corners active={isDrop} />
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"3px 8px", minHeight:22,
        borderBottom:"1px solid " + P.border, background:P.panelB, flexShrink:0,
      }}>
        <span style={{
          fontFamily:"'Jost',sans-serif", fontSize:11, letterSpacing:2,
          color: isDrop ? P.goldLt : P.gold, fontWeight:700, userSelect:"none",
        }}>{title}</span>
        {right}
      </div>
      <div style={{ flex:1, overflow:"auto", position:"relative" }}>
        {children}
        {isDrop && (
          <div style={{
            position:"absolute", inset:0, pointerEvents:"none",
            display:"flex", alignItems:"center", justifyContent:"center",
            background:"rgba(7,6,15,.48)",
          }}>
            <div style={{
              border:"1.5px dashed " + P.gold, borderRadius:4,
              padding:"5px 14px", color:P.goldLt,
              fontSize:8, letterSpacing:2, fontFamily:"'Jost',sans-serif",
              background:"rgba(7,6,15,.9)",
              animation:"mwGlow 1s ease-in-out infinite",
            }}>DROP TO ATTACH</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── GRIP ICON ────────────────────────────────────────────────────────────────
// 2×3 dot grid rendered in the drag handle strip
function GripDots() {
  return (
    <div style={{
      display:"grid", gridTemplateColumns:"repeat(2,4px)", gap:"4px",
      opacity:.5,
    }}>
      {[0,1,2,3,4,5].map((i) => (
        <div key={i} style={{
          width:3.5, height:3.5, borderRadius:"50%",
          background:P.amber,
        }} />
      ))}
    </div>
  );
}

// ─── DIEGETIC GAME VIEW ───────────────────────────────────────────────────────
function GameView({ attached, params }) {
  const has = (id) => attached.some((t) => t.id === id);
  const gp  = (id, key, def) =>
    params[id] && params[id][key] != null ? params[id][key] : def;

  const hasForm    = has("form");
  const hasHP      = has("hp");
  const hasMelee   = has("melee");
  const hasRanged  = has("ranged");
  const hasMagic   = has("magic");
  const hasArmor   = has("armor");
  const hasMove    = has("move");
  const hasSight   = has("sight");
  const hasBrain   = has("brain");
  const hasVoice   = has("voice");
  const hasElement = has("element");

  const heartCount   = hasHP      ? Math.round(gp("hp",     "maxHp",    3))   : 0;
  const bodyScale    = hasForm    ? gp("form",  "scale",    10) / 10           : 1;
  const bodyOpacity  = hasForm    ? gp("form",  "opacity",  100) / 100         : 1;
  const moveSpeed    = hasMove    ? gp("move",  "speed",    5)                 : 5;
  const bounceDur    = hasMove    ? (1.9 - moveSpeed * 0.14).toFixed(2) + "s" : "1.4s";
  const sightRange   = hasSight   ? gp("sight", "range",    5)                 : 5;
  const sightFov     = hasSight   ? gp("sight", "fov",      90)                : 90;
  const voiceRadius  = hasVoice   ? gp("voice", "radius",   5)                 : 5;
  const wispCount    = hasElement ? Math.max(2, Math.round(gp("element","intensity",5) * 0.8)) : 0;
  const armorOpacity = hasArmor   ? 0.28 + gp("armor","defense",5) * 0.06     : 0;
  const coneSize     = 18 + sightRange * 4;

  const selectedSprite = gp("form", "sprite", "abstract");
  const spriteData     = SPRITES.find((s) => s.id === selectedSprite);
  const useEmoji       = hasForm && spriteData && spriteData.emoji;
  const emojiSize      = Math.round(36 + bodyScale * 22);

  return (
    <div style={{
      width:"100%", height:"100%", position:"relative", overflow:"hidden",
      background:"#050310",
    }}>
      {/* Floor grid */}
      <div style={{
        position:"absolute", inset:0, pointerEvents:"none",
        backgroundImage:
          "linear-gradient(rgba(60,30,120,.09) 1px,transparent 1px)," +
          "linear-gradient(90deg,rgba(60,30,120,.09) 1px,transparent 1px)",
        backgroundSize:"14px 14px",
      }} />

      {/* HP HEARTS */}
      {hasHP && (
        <div style={{
          position:"absolute", top:8, left:0, right:0,
          display:"flex", justifyContent:"center", gap:5,
          zIndex:10, pointerEvents:"none",
        }}>
          {Array.from({ length: heartCount }).map((_, i) => (
            <div key={i} style={{
              width:11, height:10,
              background:P.redLt,
              clipPath:"polygon(50% 100%, 0% 35%, 15% 0%, 50% 20%, 85% 0%, 100% 35%)",
              animation:"mwHP " + (1.4 + i * 0.2) + "s ease-in-out " + (i * 0.18) + "s infinite alternate",
            }} />
          ))}
        </div>
      )}

      {/* DETECTION CONE */}
      {hasSight && (
        <div style={{
          position:"absolute", right:10,
          top:"calc(50% - " + coneSize + "px)",
          width:0, height:0,
          borderTop:    coneSize + "px solid transparent",
          borderBottom: coneSize + "px solid transparent",
          borderLeft:   Math.round(20 + sightFov * 0.22) + "px solid rgba(216,184,56,.15)",
          animation:"mwSightPulse 2.4s ease-in-out infinite",
          pointerEvents:"none",
        }} />
      )}

      {/* VOICE RIPPLES */}
      {hasVoice && [0,1,2].map((i) => {
        const base = 36 + voiceRadius * 4;
        return (
          <div key={i} style={{
            position:"absolute", top:"50%", left:"50%",
            width:  base + i * 22, height: base + i * 22,
            marginLeft:-(base / 2 + i * 11), marginTop:-(base / 2 + i * 11),
            border:"1px solid rgba(200,120,40," + (0.4 - i * 0.11) + ")",
            borderRadius:"50%",
            animation:"mwRipple 2.8s ease-out " + (i * 0.9) + "s infinite",
            pointerEvents:"none",
          }} />
        );
      })}

      {/* ELEMENT WISPS */}
      {hasElement && Array.from({ length: wispCount }).map((_, i) => {
        const angle = (i / wispCount) * Math.PI * 2;
        const r = 44;
        return (
          <div key={i} style={{
            position:"absolute",
            top:  "calc(50% + " + (Math.sin(angle) * r).toFixed(1) + "px)",
            left: "calc(50% + " + (Math.cos(angle) * r).toFixed(1) + "px)",
            width:6, height:11,
            background:"linear-gradient(to top,#d87030,#f0a040)",
            borderRadius:"50% 50% 30% 30%",
            opacity:.72,
            animation:"mwWisp " + (1.2 + i * 0.3) + "s ease-in-out " + (i * 0.25) + "s infinite alternate",
            pointerEvents:"none",
          }} />
        );
      })}

      {/* MAGIC RING */}
      {hasMagic && (
        <div style={{
          position:"absolute", top:"50%", left:"50%",
          width:72, height:72, marginLeft:-36, marginTop:-36,
          border:"1.5px dashed rgba(152,100,232,.38)",
          borderRadius:"50%",
          animation:"mwSpin 6s linear infinite",
          pointerEvents:"none", zIndex:1,
        }}>
          {[0,1,2,3].map((i) => (
            <div key={i} style={{
              position:"absolute", width:5, height:5, borderRadius:"50%",
              background:"rgba(180,140,255,.6)",
              top:  "calc(50% + " + (Math.sin((i/4)*Math.PI*2) * 34).toFixed(1) + "px)",
              left: "calc(50% + " + (Math.cos((i/4)*Math.PI*2) * 34).toFixed(1) + "px)",
              marginLeft:-2.5, marginTop:-2.5,
            }} />
          ))}
        </div>
      )}

      {/* ARMOUR RING */}
      {hasArmor && (
        <div style={{
          position:"absolute", top:"50%", left:"50%",
          width:62, height:62, marginLeft:-31, marginTop:-31,
          border:"2.5px solid rgba(90,154,224," + armorOpacity.toFixed(2) + ")",
          borderRadius:"50%",
          boxShadow:"0 0 12px rgba(90,154,224," + (armorOpacity * 0.5).toFixed(2) + ")",
          pointerEvents:"none", zIndex:1,
          animation:"mwArmorPulse 3s ease-in-out infinite",
        }} />
      )}

      {/* MOVEMENT FOOTPRINTS */}
      {hasMove && (
        <div style={{
          position:"absolute", bottom:12, left:0, right:0,
          display:"flex", justifyContent:"center", gap:9,
          pointerEvents:"none",
        }}>
          {[0,1,2].map((i) => (
            <div key={i} style={{
              width:5, height:7, borderRadius:"40%",
              background:"rgba(196,154,44,.28)",
              transform: i % 2 === 0 ? "rotate(-8deg)" : "rotate(8deg)",
              animation:"mwStep 1.6s ease-in-out " + (i * 0.5) + "s infinite alternate",
            }} />
          ))}
        </div>
      )}

      {/* BRAIN THOUGHT BUBBLE */}
      {hasBrain && (
        <div style={{
          position:"absolute", top: hasHP ? 28 : 8, right:12,
          display:"flex", flexDirection:"column", alignItems:"center", gap:2,
          pointerEvents:"none",
          animation:"mwThink 2.2s ease-in-out infinite",
        }}>
          {[4,6,9].map((sz, i) => (
            <div key={i} style={{
              width:sz, height:sz, borderRadius:"50%",
              background:"rgba(180,160,230,.28)",
              border:"1px solid rgba(180,160,230,.44)",
            }} />
          ))}
        </div>
      )}

      {/* RANGED ARROW */}
      {hasRanged && (
        <div style={{
          position:"absolute",
          right: hasSight ? 28 : 14, top:"28%",
          display:"flex", alignItems:"center",
          pointerEvents:"none",

// ─── SLIDER ROW ───────────────────────────────────────────────────────────────
// Uses plain block-level divs (not flex-column) so stacking is guaranteed on
// every mobile browser. Block divs always stack vertically — no layout ambiguity.
function SliderRow({ slider, value, onChange }) {
  const displayVal = Number.isInteger(slider.step)
    ? Math.round(value)
    : value.toFixed(1);
  const unitStr = slider.unit ? " " + slider.unit : "";
  return (
    <div style={{ width:"100%", padding:"4px 0 7px" }}>
      {/* Header: label + current value side by side */}
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
        <span style={{ fontSize:7.5, color:P.textMd, fontFamily:"monospace" }}>
          {slider.label}
        </span>
        <span style={{ fontSize:7.5, color:P.amber, fontFamily:"monospace" }}>
          {displayVal}{unitStr}
        </span>
      </div>
      {/* Slider: its own block-level div forces a new line */}
      <div style={{ width:"100%", marginBottom:4 }}>
        <input
          type="range"
          min={slider.min} max={slider.max} step={slider.step}
          value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="mw-slider"
          style={{ display:"block", width:"100%", cursor:"pointer" }}
        />
      </div>
      {/* Range hint labels */}
      <div style={{ display:"flex", justifyContent:"space-between" }}>
        <span style={{ fontSize:5.5, color:P.textDk, fontFamily:"monospace" }}>
          {slider.min}{unitStr}
        </span>
        <span style={{ fontSize:5.5, color:P.textDk, fontFamily:"monospace" }}>
          {slider.max}{unitStr}
        </span>
      </div>
    </div>
  );
}

// ─── INTRO SCREEN ─────────────────────────────────────────────────────────────
function IntroScreen({ onComplete }) {
  const [step, setStep]              = useState(0);
  const [revealedChars, setRevealed] = useState(0);
  const slide      = INTRO_SLIDES[step];
  // Join lines with newline for a flat char array; track total length
  const flatText   = slide.lines.join("\n");
  const totalChars = flatText.length;
  const isTextDone = revealedChars >= totalChars;
  const isLast     = !!slide.isLast;

  // Char-by-char timer — 32ms each (~medium visual-novel pace)
  useEffect(() => {
    if (revealedChars >= totalChars) return;
    const t = setTimeout(() => setRevealed((r) => r + 1), 32);
    return () => clearTimeout(t);
  }, [revealedChars, totalChars]);

  // Reset on slide change
  useEffect(() => { setRevealed(0); }, [step]);

  const handleBtn = () => {
    if (!isTextDone) {
      setRevealed(totalChars);   // skip: instantly show all
    } else if (isLast) {
      onComplete();
    } else {
      setStep((s) => s + 1);
    }
  };

  // Split revealed flat text back into display lines, last char gets animation
  const revealedFlat  = flatText.slice(0, revealedChars);
  const stableFlat    = revealedFlat.slice(0, -1);
  const latestChar    = revealedFlat.slice(-1);
  const stableLines   = stableFlat.split("\n");
  // Figure out if latest char ends a line
  const allRevLines   = revealedFlat.split("\n");
  const lastLineStable = stableLines[stableLines.length - 1];
  const lastLineLatest = allRevLines[allRevLines.length - 1];
  const latestIsNewline = latestChar === "\n";

  return (
    <div style={{
      position:"fixed", inset:0, zIndex:2000,
      background:"#040210",
      display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"flex-start",
      padding:"5vh 24px 28px",
      overflow:"auto",
    }}>

      {/* Step dots */}
      <div style={{ display:"flex", gap:6, marginBottom:"2vh" }}>
        {INTRO_SLIDES.map((_, i) => (
          <div key={i} style={{
            height:4, borderRadius:2,
            width: i === step ? 18 : 5,
            background: i < step ? P.amber : i === step ? P.goldLt : P.border,
            transition:"all .3s",
          }} />
        ))}
      </div>

      {/* Visual */}
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"center",
        marginBottom:"2vh", minHeight:155,
      }}>
        <IntroVisual slide={slide} compCount={slide.showComps} />
      </div>

      {/* Title */}
      <div style={{
        fontSize:20, fontWeight:700, color:P.goldLt,
        letterSpacing:1.5, textAlign:"center",
        marginBottom:"1.5vh", whiteSpace:"pre-line",
        animation:"mwIntroSlideUp .28s ease",
      }} key={"t-" + step}>{slide.title}</div>

      {/* Char-by-char text area */}
      <div style={{ maxWidth:340, width:"100%", marginBottom:"2.5vh", minHeight:92 }}>
        {/* Render lines: stable lines fully opaque, last line gets the animated latest char */}
        {allRevLines.map((line, li) => {
          const isLastLine = li === allRevLines.length - 1;
          const isBlankNewline = line === "" && !isLastLine;
          if (isBlankNewline) return <div key={li} style={{ height:"0.5em" }} />;
          const stablePart = isLastLine ? lastLineStable : line;
          return (
            <div key={li} style={{ fontSize:13, color:P.textMd, lineHeight:1.8 }}>
              <span>{stablePart}</span>
              {isLastLine && latestChar && !latestIsNewline && (
                <span key={"ch-" + revealedChars}
                  style={{ animation:"mwCharFade .22s ease both" }}>
                  {latestChar}
                </span>
              )}
            </div>
          );
        })}
      </div>

      {/* Arrow button: stroke while animating, filled when done */}
      <button className="mw-btn" onClick={handleBtn}
        style={{
          width:52, height:52, borderRadius:"50%", flexShrink:0,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:22, lineHeight:1,
          border:"2px solid " + (isTextDone ? P.amber : "rgba(240,200,74,.28)"),
          background: isTextDone ? "rgba(240,200,74,.18)" : "transparent",
          color: isTextDone ? P.goldLt : "rgba(240,200,74,.3)",
          transition:"border-color .45s, background .45s, color .45s",
          animation: isTextDone ? "mwGlow 1.4s ease-in-out infinite" : "none",
        }}>→</button>
    </div>
  );
}


function MonsterWorkshop() {
  const [attached,     setAttached]     = useState([]);
  const [selected,     setSelected]     = useState(null);
  const [challenge,    setChallenge]    = useState(null);
  const [chalDone,     setChalDone]     = useState(false);
  const [showWin,      setShowWin]      = useState(false);
  const [showBestiary, setShowBestiary] = useState(false);
  const [showInfo,     setShowInfo]     = useState(false);
  const [showIntro,    setShowIntro]    = useState(true);
  const [expanded,     setExpanded]     = useState(null);
  const [params,       setParams]       = useState({});

  // drag state
  const dragRef            = useRef(null);   // { id, name, emoji }
  const [ghostPos, setGhostPos] = useState(null);

  // panel refs for hit-testing
  const gameRef      = useRef(null);
  const inspectorRef = useRef(null);

  // ── drop zone highlight helpers ───────────────────────────────
  const isOverPanel = useCallback((ref) => {
    if (!ghostPos || !ref.current) return false;
    const r = ref.current.getBoundingClientRect();
    return ghostPos.x >= r.left && ghostPos.x <= r.right &&
           ghostPos.y >= r.top  && ghostPos.y <= r.bottom;
  }, [ghostPos]);
  const isOverGame      = isOverPanel(gameRef);
  const isOverInspector = isOverPanel(inspectorRef);

  // ── params helpers ────────────────────────────────────────────
  const getParam = (id, key, def) =>
    params[id] && params[id][key] != null ? params[id][key] : def;
  const setParam = useCallback((id, key, val) => {
    setParams((p) => ({ ...p, [id]: { ...(p[id] || {}), [key]: val } }));
  }, []);

  // ── attach / detach ───────────────────────────────────────────
  const attachAndCheck = useCallback((id) => {
    setAttached((prev) => {
      if (prev.find((t) => t.id === id)) return prev;
      const trait = TRAITS.find((t) => t.id === id);
      if (!trait) return prev;
      const next = [...prev, trait];
      setChallenge((ch) => {
        if (ch) {
          const done = ch.required.every((r) => next.some((t) => t.id === r));
          if (done) {
            setChalDone(true); setShowWin(true);
            setTimeout(() => setShowWin(false), 3000);
          }
        }
        return ch;
      });
      return next;
    });
  }, []);

  const detach = (id) => {
    setAttached((p) => p.filter((t) => t.id !== id));
    if (expanded === id) setExpanded(null);
  };
  const isOn = (id) => attached.some((t) => t.id === id);

  const resetAll = () => {
    setAttached([]); setChallenge(null);
    setChalDone(false); setSelected(null);
    setShowWin(false); setExpanded(null); setParams({});
    dragRef.current = null; setGhostPos(null);
  };

  const startChallenge = (ch) => {
    setChallenge(ch); setChalDone(false);
    setAttached([]); setSelected({ type:"challenge", data:ch });
    setShowBestiary(false); setExpanded(null); setParams({});
  };

  // ── pointer drag -- only fired from the drag handle strip ─────
  const handlePointerDown = useCallback((e, trait) => {
    if (isOn(trait.id)) return;
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    dragRef.current = { id: trait.id, name: trait.name, emoji: trait.emoji };
    setGhostPos({ x: e.clientX, y: e.clientY });
  }, [attached]); // eslint-disable-line

  const handlePointerMove = useCallback((e) => {
    if (!dragRef.current) return;
    setGhostPos({ x: e.clientX, y: e.clientY });
  }, []);

  const handlePointerUp = useCallback((e) => {
    if (!dragRef.current) return;
    const id = dragRef.current.id;
    dragRef.current = null;
    setGhostPos(null);
    const x = e.clientX, y = e.clientY;
    const over = (ref) => {
      if (!ref.current) return false;
      const r = ref.current.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    };
    if (over(gameRef) || over(inspectorRef)) attachAndCheck(id);
  }, [attachAndCheck]);

  // ── selection ─────────────────────────────────────────────────
  const sel = (type, data) =>
    setSelected((p) => p && p.type === type && p.data.id === data.id ? null : { type, data });
  const toggleExpanded = (id) => setExpanded((e) => e === id ? null : id);

  // ── derived ───────────────────────────────────────────────────
  const chalProgress = challenge ? challenge.required.filter((r) => isOn(r)).length : 0;
  const chalTotal    = challenge ? challenge.required.length : 0;
  const gameParams   = {};
  TRAITS.forEach((t) => {
    gameParams[t.id] = {};
    t.sliders.forEach((s) => { gameParams[t.id][s.key] = getParam(t.id, s.key, s.def); });

  gameParams.form        = gameParams.form || {};
  gameParams.form.sprite = getParam("form", "sprite", "abstract");

  // ─────────────────────────────────────────────────────────────
  return (
    <>
      <style>{`

        html,body,#root{height:100%;background:${P.bg};overflow:hidden;}
        /* Desktop: zoom mw-root up for readability.
           Height must be divided by zoom so the VISUAL height still equals 100vh.
           Modals live OUTSIDE mw-root so fixed positioning works correctly. */
        .mw-root{font-family:'Jost',sans-serif;}
        @media(min-width:600px) and (max-width:1199px){
          .mw-root{zoom:1.3; height:calc(100vh / 1.3) !important; max-height:calc(100vh / 1.3) !important;}
        }
        @media(min-width:1200px){
          .mw-root{zoom:1.55; height:calc(100vh / 1.55) !important; max-height:calc(100vh / 1.55) !important;}
        }
        ::-webkit-scrollbar{width:2px;height:2px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${P.goldDk};border-radius:1px;}

        .mw-slider{-webkit-appearance:none;appearance:none;display:block;width:100%;height:4px;
          background:rgba(240,216,88,.25);border-radius:2px;outline:none;}
        .mw-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
          width:16px;height:16px;border-radius:50%;background:#f0d858;cursor:pointer;border:none;
          box-shadow:0 0 6px rgba(240,216,88,.5);}
        .mw-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;
          background:#f0d858;cursor:pointer;border:none;}


        @keyframes mwBounce    {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes mwRipple    {0%{transform:scale(.4);opacity:.85}100%{transform:scale(2.4);opacity:0}}
        @keyframes mwHP        {0%{opacity:.4;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
        @keyframes mwGlow      {0%,100%{opacity:.65}50%{opacity:1}}
        @keyframes mwSpin      {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes mwWisp      {0%{transform:translateY(0) scale(1);opacity:.7}100%{transform:translateY(-9px) scale(.5);opacity:.1}}
        @keyframes mwSwordBob  {0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-3px)}}
        @keyframes mwArrow     {0%,100%{transform:translateX(0);opacity:.5}50%{transform:translateX(5px);opacity:1}}
        @keyframes mwArmorPulse{0%,100%{opacity:.7}50%{opacity:1}}
        @keyframes mwStep      {0%{opacity:.18;transform:rotate(-8deg) translateY(0)}100%{opacity:.65;transform:rotate(-8deg) translateY(-3px)}}
        @keyframes mwThink     {0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-4px);opacity:1}}
        @keyframes mwSightPulse{0%,100%{opacity:.22}50%{opacity:.68}}
        @keyframes mwWin       {0%{transform:scale(0) rotate(-12deg);opacity:0}65%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
        @keyframes mwExpand    {from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        @keyframes mwModalIn   {from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
        @keyframes mwCompFlyIn   {from{opacity:0;transform:translateY(-24px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes mwIntroShimmer{0%,100%{box-shadow:0 0 36px rgba(60,100,210,.25)}50%{box-shadow:0 0 54px rgba(60,100,210,.5)}}
        @keyframes mwIntroSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes mwLineFadeIn  {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes mwCharFade    {from{opacity:0}to{opacity:1}}
        @keyframes mwAppBuildIn  {0%{opacity:0;transform:scale(.97) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}

        .mw-btn {cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none;}
        .mw-btn:active{opacity:.72;}
        .mw-chip{-webkit-tap-highlight-color:transparent;user-select:none;cursor:pointer;}
        .mw-chip:active{opacity:.78;}
        /* Handle: touch-action none only on the left drag strip */
        .mw-handle{touch-action:none;cursor:grab;user-select:none;}
        .mw-handle:active{cursor:grabbing;}
      `}</style>

                      <button className="mw-btn"
                        onClick={(e) => { e.stopPropagation(); detach(t.id); }}

                      <div style={{

                        {isRenderer && (
                          <SpritePicker
                            selected={getParam("form","sprite","abstract")}

                            value={getParam(t.id, sl.key, sl.def)}

              })}
            </Panel>
          </div>

          {/* BOTTOM ROW — even 50/50 split */}
          <div style={{ flex:1, display:"flex", gap:2, minHeight:0 }}>

                  <div

                      display:"flex", alignItems:"stretch",

                        padding:"12px 8px",

                          <div style={{ fontSize:10, color:P.textMd, fontStyle:"italic", marginBottom:5 }}>{ch.flavor}</div>
                          <div style={{ fontSize:10, color:P.textDk, lineHeight:1.6, marginBottom:6 }}>{ch.story}</div>
                          <div style={{ fontSize:9, color:P.amber, fontStyle:"italic", marginBottom:8 }}>Hint: {ch.tip}</div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>
                            {ch.required.map((rid) => {
                              const t = TRAITS.find((x) => x.id === rid);
                              return t ? (
                                <div key={rid} style={{
                                  padding:"2px 7px", borderRadius:10,
                                  border:"1px solid " + P.border,
                                  fontSize:8, color:P.textMd,
                                }}>{t.emoji} {t.name}</div>
                              ) : null;
                            })}
                          </div>
                          {isDone ? (
                            <div style={{ fontSize:10, color:P.greenLt, fontFamily:"'Jost',sans-serif" }}>
                              Challenge Complete!
                            </div>
                          ) : (
                            <button className="mw-btn" onClick={() => startChallenge(ch)} style={{
                              padding:"5px 16px",
                              border:"1px solid " + (isAct ? P.gold : P.border),
                              borderRadius:3,
                              background: isAct ? "rgba(196,154,44,.12)" : "rgba(255,255,255,.03)",
                              color: isAct ? P.goldLt : P.textMd,
                              fontSize:8, letterSpacing:1, fontFamily:"'Jost',sans-serif",
                            }}>{isAct ? "IN PROGRESS" : "ATTEMPT"}</button>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ══ WIN OVERLAY ══ */}
        {showWin && (
          <div onClick={() => setShowWin(false)} style={{
            position:"fixed", inset:0, zIndex:500,
            background:"rgba(7,6,15,.93)",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>
            <div style={{
              background:P.panel, border:"2px solid " + P.gold,
              borderRadius:12, padding:"30px 44px",
              textAlign:"center", position:"relative",
              animation:"mwWin .45s cubic-bezier(.34,1.56,.64,1)",
            }}>
              <Corners active={true} />
              <div style={{ fontSize:52, lineHeight:1 }}>{challenge ? challenge.emoji : ""}</div>
              <div style={{
                fontFamily:"'Jost',sans-serif", fontSize:17,
                color:P.goldLt, marginTop:12, letterSpacing:2,
              }}>CREATURE FORGED</div>
              <div style={{ fontSize:12, color:P.textMd, marginTop:5, fontStyle:"italic" }}>
                {challenge ? challenge.name : ""} enters the dungeon
              </div>
              <div style={{ marginTop:6, fontSize:8, color:P.textDk, fontFamily:"monospace" }}>
                tap to continue
              </div>
            </div>
          </div>
        )}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<MonsterWorkshop />);
  </script>
</body>
</html>
