        <button className="mw-btn" onClick={onNext} style={{
          width:"100%", padding:"11px",
          border:"1.5px solid "+P.amber, borderRadius:6,
          background:"rgba(196,154,44,.14)", color:P.goldLt,
          fontSize:13, letterSpacing:1.5, fontWeight:700,
          animation:"mwGlow 1.6s ease-in-out infinite",
        }}>{isLast ? "SEE YOUR PROGRESS →" : "NEXT CHALLENGE →"}</button>
      </div>
    </div>
  );
}


// ─── INSPECTOR ROW COMPONENT ─────────────────────────────────────────────────
function AttachedRow({ t, expanded, challenge, chalDone, spriteHint,
    getParam, setParam, detach, toggleExpanded, setSpriteHint, spritesUnlocked }) {
  const isExp      = expanded === t.id;
  const req        = challenge && challenge.required.includes(t.id);
  const sliders    = SLIDER_MAP[t.id] || [];
  const isRenderer = t.id === "form";
  return (
    <div key={t.id}>
      <div className="mw-chip" onClick={() => {
          toggleExpanded(t.id);
          if (isRenderer && spriteHint === "renderer") setSpriteHint("rat");
        }}
        style={{
          display:"flex", alignItems:"center", gap:4,
          padding:"7px 5px",
          borderBottom:"1px solid " + P.border,
          background: isExp ? "rgba(200,120,32,.06)" : "transparent",
          transition:"background .15s",
          position:"relative",
        }}
      >
        <div style={{ width:4, borderLeft:"1px solid " + P.border, alignSelf:"stretch" }} />
        {isRenderer && spriteHint === "renderer" && (
          <div style={{
            fontSize:13, color:"rgba(255,255,255,.85)",
            animation:"mwTriBounce 1.1s ease-in-out infinite",
            pointerEvents:"none", lineHeight:1, flexShrink:0,
            filter:"drop-shadow(0 0 3px rgba(255,255,255,.3))",
            marginRight:2,
          }}>{"➤"}</div>
        )}
        <span style={{ fontSize:12, lineHeight:1, flexShrink:0 }}>{t.emoji}</span>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{
            fontSize:14, fontFamily:"'Jost',sans-serif", letterSpacing:.2, color:P.text,
            whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
          }}>{t.name}</div>
        </div>
        <span style={{
          fontSize:11, color:P.textDk, flexShrink:0, display:"inline-block",
          transform: isExp ? "rotate(90deg)" : "none", transition:"transform .2s",
        }}>{">"}</span>
        {req && (
          <span style={{ fontSize:11, color: chalDone ? P.greenLt : P.amber, flexShrink:0 }}>
            {chalDone ? "v" : "!"}
          </span>
        )}
        <button className="mw-btn"
          onClick={(e) => { e.stopPropagation(); detach(t.id); }}
          style={{
            color:P.red, fontSize:13, lineHeight:1, padding:"0 2px", flexShrink:0,
          }}
        >x</button>
      </div>
      {isExp && (
        <div style={{
          padding:"7px 10px 9px 18px",
          borderBottom:"1px solid " + P.border,
          background:"rgba(0,0,0,.2)",
          animation:"mwExpand .15s ease",
        }}>
          {isRenderer && (
            <SpritePicker
              selected={getParam("form","sprite","abstract")}
              onSelect={(id) => setParam("form","sprite",id)}
              showRatHint={spriteHint === "rat"}
              spritesUnlocked={spritesUnlocked}
            />
          )}
          {sliders.map((sl) => (
            <SliderRow key={sl.key} slider={sl}
              value={getParam(t.id, sl.key, sl.def)}
              onChange={(val) => setParam(t.id, sl.key, val)}
            />
          ))}
        </div>
      )}
    </div>
  );
}


// ─── COMPONENT LIST ROW ───────────────────────────────────────────────────────
function TraitRow({ trait, isOn, selected, challenge, ghostPos, dragRef,
    starterRevealTime, fullRevealTime, stage2Shown,
    handlePointerDown, handlePointerMove, handlePointerUp, sel, unlockedIds,
    showStarterHint, showRendererHint }) {
  const on         = isOn(trait.id);
  const isSel      = selected && selected.type === "trait" && selected.data.id === trait.id;
  const req        = challenge && challenge.required.includes(trait.id);
  const isDragging = ghostPos && dragRef.current && dragRef.current.id === trait.id;
  const starterIdx    = STARTER_PACK.indexOf(trait.id);
  const fullIdx       = FULL_UNLOCK.indexOf(trait.id);
  const rendererIdx   = RENDERER_PACK.indexOf(trait.id);
  const isNewlyRevealed = (starterRevealTime && starterIdx !== -1) ||
                          (fullRevealTime   && fullIdx    !== -1) ||
                          (rendererIdx !== -1 && starterRevealTime === null && !stage2Shown);
  const popDelay = isNewlyRevealed
    ? ((starterIdx !== -1 ? starterIdx : fullIdx !== -1 ? fullIdx : rendererIdx) * 0.1) + "s"
    : "0s";
  return (
    <div
      key={trait.id}
      style={{
        display:"flex", alignItems:"stretch",
        borderBottom:"1px solid " + P.border,
        boxShadow: isSel
          ? "inset 2px 0 0 " + P.amberLt
          : req ? "inset 2px 0 0 rgba(200,120,32,.5)"
          : "inset 2px 0 0 transparent",
        background: isSel ? "rgba(200,120,32,.07)" : "transparent",
        opacity: isDragging ? 0.22 : 1,
        transition:"opacity .1s, background .1s",
        animation: isNewlyRevealed ? "mwCompFlyIn .55s cubic-bezier(.34,1.4,.64,1) both" : "none",
        animationDelay: popDelay,
      }}
    >
      <div
        className={!on ? "mw-handle" : ""}
        onPointerDown={!on ? (e) => handlePointerDown(e, trait) : undefined}
        onPointerMove={!on ? handlePointerMove : undefined}
        onPointerUp={!on ? handlePointerUp : undefined}
        onPointerCancel={!on ? handlePointerUp : undefined}
        onClick={(e) => e.stopPropagation()}
        style={{
          width:40, flexShrink:0,
          display:"flex", alignItems:"center", justifyContent:"center",
          borderRight:"1px solid " + P.border,
          background: on ? "transparent" : "rgba(200,120,32,.03)",
          cursor: on ? "default" : "grab",
          position:"relative",
        }}
      >
        {!on && <GripDots />}

        {/* Starter pack tutorial hint arrows */}
        {showStarterHint && !on && STARTER_PACK.includes(trait.id) && (
          <div style={{
            position:"absolute", bottom:-2, right:-10,
            zIndex:20, pointerEvents:"none",
            animation:"mwDragHint 1.1s ease-in-out infinite",
            fontSize:16, transform:"rotate(-40deg)", transformOrigin:"center center",
            filter:"drop-shadow(0 0 3px rgba(240,200,74,.5))", lineHeight:1,
            color:P.amber,
          }}>{"➤"}</div>
        )}
        {/* Renderer tutorial hint arrow */}
        {showRendererHint && !on && trait.id === "form" && (
          <div style={{
            position:"absolute", bottom:-2, right:-10,
            zIndex:20, pointerEvents:"none",
            animation:"mwDragHint 1.1s ease-in-out infinite",
            fontSize:16, transform:"rotate(-40deg)", transformOrigin:"center center",
            filter:"drop-shadow(0 0 3px rgba(255,255,255,.3))", lineHeight:1,
          }}>{"➤"}</div>
        )}
      </div>
      <div
        className="mw-chip"
        onClick={() => sel("trait", trait)}
        style={{ flex:1, display:"flex", alignItems:"center", padding:"12px 8px", minWidth:0 }}
      >
        <span style={{
          flex:1, fontSize:15, fontFamily:"'Jost',sans-serif", letterSpacing:.15,
          color: on ? P.textDk : "#f5dc5a",
          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
        }}>{trait.name}</span>
        {on  && <span style={{ fontSize:11, color:P.textDk,  fontFamily:"monospace", flexShrink:0 }}>on</span>}
        {!on && req && <span style={{ fontSize:11, color:P.amber, fontFamily:"monospace", flexShrink:0 }}>req</span>}
      </div>
    </div>
  );
}

function MonsterWorkshop() {
  const [attached,     setAttached]     = useState([]);
  const [selected,     setSelected]     = useState(null);
  const [challenge,    setChallenge]    = useState(null);
  const [chalDone,     setChalDone]     = useState(false);
  const [showWin,      setShowWin]      = useState(false);
  const [showIntro,    setShowIntro]    = useState(true);
  const [expanded,     setExpanded]     = useState(null);
  const [params,       setParams]       = useState({});

  // ── Tutorial stages ────────────────────────────────────────────
  const [unlockedIds,      setUnlockedIds]      = useState([...STARTER_IDS]);
  const [rendererPopup,    setRendererPopup]    = useState(false);  // "try change sprite"
  const [spriteDonePopup,  setSpriteDonePopup]  = useState(false);  // congrats + next challenge
  const [starterRevealTime,setStarterRevealTime]= useState(null);
  const [stage2Popup,      setStage2Popup]      = useState(false);
  const [stage2Shown,      setStage2Shown]      = useState(false);
  const [fullRevealTime,   setFullRevealTime]   = useState(null);
  const [rendererShown,    setRendererShown]    = useState(false);
  const [spriteDoneShown,  setSpriteDoneShown]  = useState(false);
  const [spriteHint,       setSpriteHint]       = useState(null);

  // ── Challenge system ───────────────────────────────────────────
  const [challengeIdx,    setChallengeIdx]    = useState(-1);    // -1 = not started
  const [showChallenge,   setShowChallenge]   = useState(false); // challenge brief popup
  const [showSolution,    setShowSolution]    = useState(false);
  const [showSuccess,     setShowSuccess]     = useState(false);
  const [freeformMode,    setFreeformMode]    = useState(false);
  const [spritesUnlocked, setSpritesUnlocked] = useState(false);
  const [showBridge,      setShowBridge]      = useState(false);
  const [showRendererPrompt, setShowRendererPrompt] = useState(false);
  const [showMeleePrompt,    setShowMeleePrompt]    = useState(false);
  const [showSpritePrompt,   setShowSpritePrompt]   = useState(false);
  const [showCombineSlide,  setShowCombineSlide]  = useState(false);
  const [showCustomizeSlide,setShowCustomizeSlide] = useState(false);
  const [showPatternSlide,  setShowPatternSlide]   = useState(false);
  const [showOutro,       setShowOutro]       = useState(false);
  const activeChallenge = challengeIdx >= 0 && challengeIdx < CHALLENGES.length
    ? CHALLENGES[challengeIdx] : null;

  // ── Stage 1: renderer attach → popup → COMBINE BEHAVIORS slide → unlock starter pack ──
  const rendererAttached = attached.some(t => t.id === "form");
  const [prevRendererAttached, setPrevRendererAttached] = useState(false);
  useEffect(() => {
    if (rendererAttached && !prevRendererAttached && !rendererShown) {
      setRendererPopup(true);
      setRendererShown(true);
    }
    setPrevRendererAttached(rendererAttached);
  }, [rendererAttached, rendererShown]); // eslint-disable-line

  // Dismiss renderer popup → show COMBINE BEHAVIORS slide
  const dismissRenderer = () => {
    setRendererPopup(false);
    setShowCombineSlide(true);
  };

  // COMBINE BEHAVIORS slide onComplete → unlock Move/Brain/Melee
  const onCombineComplete = () => {
    setShowCombineSlide(false);
    setShowMeleePrompt(true);
  };

  // ── Stage 2: all starter components attached → "MELEE ATTACKER" popup ────────
  const starterAllAttached = STARTER_PACK.every(id => attached.some(t => t.id === id));
  useEffect(() => {
    if (starterAllAttached && !stage2Shown && starterRevealTime) {
      setTimeout(() => setStage2Popup(true), 2000);
      setStage2Shown(true);
    }
  }, [starterAllAttached, stage2Shown, starterRevealTime]);

  // Dismiss stage2 → unlock all components + trigger sprite step
  const dismissStage2 = () => {
    setStage2Popup(false);
    // Show CUSTOMIZE slide first, then start sprite tutorial
    setShowCustomizeSlide(true);
  };

  // ── Stage 3: sprite changed → popup → CUSTOMIZE slide → PATTERN slide ────────
  const currentSprite = (params["form"] && params["form"]["sprite"] != null)
    ? params["form"]["sprite"] : "abstract";
  const [prevSprite, setPrevSprite] = useState("abstract");
  useEffect(() => {
    if (currentSprite !== "abstract" && prevSprite === "abstract" && !spriteDoneShown && stage2Shown) {
      setTimeout(() => setSpriteDonePopup(true), 2000);
      setSpriteDoneShown(true);
      setSpriteHint(null);
    }
    setPrevSprite(currentSprite);
  }, [currentSprite, prevSprite, spriteDoneShown, stage2Shown]); // eslint-disable-line

  const dismissSpriteDone = () => {
    setSpriteDonePopup(false);
    // Unlock all remaining components
    setUnlockedIds(ids => {
      const toAdd = FULL_UNLOCK.filter(id => !ids.includes(id));
      return toAdd.length ? [...ids, ...toAdd] : ids;
    });
    setFullRevealTime(Date.now());
    // Go straight to PATTERN slide then challenges
    setShowPatternSlide(true);
  };

  // ── Challenge completion detection ────────────────────────────
  const activeChallengeRef = useRef(null);
  activeChallengeRef.current = activeChallenge;
  useEffect(() => {
    const ch = activeChallengeRef.current;
    if (!ch || showSuccess || showChallenge) return;
    const currentSprite2 = (params["form"] && params["form"]["sprite"]) || "abstract";
    const componentsOk = ch.required.every(id => attached.some(t => t.id === id));
    const spriteOk     = currentSprite2 === ch.sprite;
    const countOk      = attached.length <= ch.maxComponents;
    const paramsOk = !ch.paramChecks || ch.paramChecks.every(pc => {
      if (!attached.some(t => t.id === pc.id)) return false;
      const val = params[pc.id] && params[pc.id][pc.key] != null ? Number(params[pc.id][pc.key]) : null;
      return val !== null && val >= pc.val;
    });
    if (componentsOk && spriteOk && countOk && paramsOk) {
      setTimeout(() => setShowSuccess(true), 1500);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [attached, params, showChallenge]);


  const dragRef            = useRef(null);   // { id, name, emoji }
  const [ghostPos, setGhostPos] = useState(null);

  // panel refs for hit-testing
  const gameRef      = useRef(null);
  const inspectorRef = useRef(null);

  // ── drop zone highlight helpers ───────────────────────────────
  const isOverPanel = useCallback((ref) => {
    if (!ghostPos || !ref.current) return false;
    const r = ref.current.getBoundingClientRect();
    return ghostPos.x >= r.left && ghostPos.x <= r.right &&
           ghostPos.y >= r.top  && ghostPos.y <= r.bottom;
  }, [ghostPos]);
  const isOverGame      = isOverPanel(gameRef);
  const isOverInspector = isOverPanel(inspectorRef);

  // ── params helpers ────────────────────────────────────────────
  const getParam = (id, key, def) =>
    params[id] && params[id][key] != null ? params[id][key] : def;
  const setParam = useCallback((id, key, val) => {
    setParams((p) => ({ ...p, [id]: { ...(p[id] || {}), [key]: val } }));
  }, []);

  // ── attach / detach ───────────────────────────────────────────
  const attachAndCheck = useCallback((id) => {
    setExpanded(null);   // collapse any open row so the new component is visible
    setAttached((prev) => {
      if (prev.find((t) => t.id === id)) return prev;
      const trait = TRAITS.find((t) => t.id === id);
      if (!trait) return prev;
      const next = [...prev, trait];
      setChallenge((ch) => {
        if (ch) {
          const done = ch.required.every((r) => next.some((t) => t.id === r));
          if (done) {
            setChalDone(true); setShowWin(true);
            setTimeout(() => setShowWin(false), 3000);
          }
        }
        return ch;
      });
      return next;
    });
  }, []);

  const detach = (id) => {
    setAttached((p) => p.filter((t) => t.id !== id));
    if (expanded === id) setExpanded(null);
  };
  const isOn = (id) => attached.some((t) => t.id === id);

  const resetAll = () => {
    setAttached([]);
    setChallenge(null); setChalDone(false); setSelected(null);
    setShowWin(false); setExpanded(null);
    setParams({});
    dragRef.current = null; setGhostPos(null);
    setSpriteHint(null);
    setShowSuccess(false); setShowChallenge(false); setShowSolution(false);
  };

  const onSuccessNext = () => {
    const nextIdx = challengeIdx + 1;
    setShowSuccess(false);
    // Clear components (keep camera)
    setAttached([]);
    setParams({}); setExpanded(null); setSelected(null);
    if (nextIdx >= CHALLENGES.length) {
      // All done — show outro after brief pause
      setTimeout(() => setShowOutro(true), 400);
    } else {
      // Next challenge — brief dramatic pause then popup
      setTimeout(() => {
        setChallengeIdx(nextIdx);
        setShowChallenge(true);
        setShowSolution(false);
      }, 500);
    }
  };

  // ── pointer drag -- only fired from the drag handle strip ─────
  const handlePointerDown = useCallback((e, trait) => {
    if (isOn(trait.id)) return;
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    dragRef.current = { id: trait.id, name: trait.name, emoji: trait.emoji };
    setGhostPos({ x: e.clientX, y: e.clientY });
  }, [attached]); // eslint-disable-line

  const handlePointerMove = useCallback((e) => {
    if (!dragRef.current) return;
    setGhostPos({ x: e.clientX, y: e.clientY });
  }, []);

  const handlePointerUp = useCallback((e) => {
    if (!dragRef.current) return;
    const id = dragRef.current.id;
    dragRef.current = null;
    setGhostPos(null);
    const x = e.clientX, y = e.clientY;
    const over = (ref) => {
      if (!ref.current) return false;
      const r = ref.current.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    };
    if (over(gameRef) || over(inspectorRef)) attachAndCheck(id);
  }, [attachAndCheck]);

  // ── selection ─────────────────────────────────────────────────
  const sel = (type, data) =>
    setSelected((p) => p && p.type === type && p.data.id === data.id ? null : { type, data });
  const toggleExpanded = (id) => setExpanded((e) => e === id ? null : id);

  // ── derived ───────────────────────────────────────────────────
  const chalProgress = challenge ? challenge.required.filter((r) => isOn(r)).length : 0;
  const chalTotal    = challenge ? challenge.required.length : 0;
  const gameParams   = {};
  TRAITS.forEach((t) => {
    gameParams[t.id] = {};
    t.sliders.forEach((s) => { gameParams[t.id][s.key] = getParam(t.id, s.key, s.def); });
  });
  gameParams.form        = gameParams.form || {};
  gameParams.form.sprite = getParam("form", "sprite", "abstract");


  // Row renderers delegated to external components
  const renderAttachedRow = (t) => (
    <AttachedRow key={t.id} t={t}
      expanded={expanded} challenge={challenge} chalDone={chalDone}
      spriteHint={spriteHint} getParam={getParam} setParam={setParam}
      detach={detach} toggleExpanded={toggleExpanded} setSpriteHint={setSpriteHint}
      spritesUnlocked={spritesUnlocked}
    />
  );
  const renderTraitRow = (trait) => (
    <TraitRow key={trait.id} trait={trait}
      isOn={isOn} selected={selected} challenge={challenge}
      ghostPos={ghostPos} dragRef={dragRef}
      starterRevealTime={starterRevealTime} fullRevealTime={fullRevealTime}
      stage2Shown={stage2Shown}
      handlePointerDown={handlePointerDown} handlePointerMove={handlePointerMove}
      handlePointerUp={handlePointerUp} sel={sel} unlockedIds={unlockedIds}
      showStarterHint={!!(starterRevealTime && !stage2Shown)}
      showRendererHint={!!(unlockedIds.includes("form") && !attached.some(t=>t.id==="form") && !rendererShown)}
    />
  );


  return (
    <div style={{ height:"100%", position:"relative" }}>
      {/* styles in HTML head */}
      <style>{`
        @keyframes mwBrainSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes mwArmorSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes mwElemPulse { 0%,100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.18); filter: brightness(1.6); } }
        @keyframes mwSuccessPop { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
        @keyframes mwWin        { from { opacity:0; transform: translateX(-16px); } to { opacity:1; transform: translateX(0); } }
      `}</style>

      <DragGhost ghostPos={ghostPos} dragInfo={dragRef.current} />

      {/* Show intro screen on first load */}
      {showIntro && <IntroScreen onComplete={() => { setShowIntro(false); setShowRendererPrompt(true); }} />}

      {showRendererPrompt && (
        <TutorialPrompt
          emoji="👤"
          title="ADD A RENDERER COMPONENT"
          body="Drag the Renderer Component onto the Unit. This gives the Object a visible sprite the player can see."
          onStart={() => setShowRendererPrompt(false)}
        />
      )}

      {showMeleePrompt && (
        <TutorialPrompt
          emoji="👤⚔️🧠🦶"
          title="ADD MORE COMPONENTS"
          body="Drag a few more components onto the Unit to give it new behaviors. These combined will create a melee attacker."
          onStart={() => {
            setShowMeleePrompt(false);
            setUnlockedIds(ids => {
              const toAdd = STARTER_PACK.filter(id => !ids.includes(id));
              return toAdd.length ? [...ids, ...toAdd] : ids;
            });
            setStarterRevealTime(Date.now());
          }}
        />
      )}

      {showSpritePrompt && (
        <TutorialPrompt
          emoji={null}
          spriteRow={["👤","🐀","👺","🪨","🧙","🗿","🐉"]}
          title="CHANGE THE RENDERER SPRITE"
          body="Open the Renderer Component in the Details panel and pick a new sprite. Any attached component can be customized for even more unique behavior."
          onStart={() => {
            setShowSpritePrompt(false);
            setSpriteHint("renderer");
          }}
        />
      )}

      {showCombineSlide && (
        <SoloSlideScreen slide={COMBINE_SLIDE} onComplete={onCombineComplete} />
      )}

      {showCustomizeSlide && (
        <SoloSlideScreen slide={CUSTOMIZE_SLIDE} onComplete={() => {
          setShowCustomizeSlide(false);
          setShowSpritePrompt(true);
        }} />
      )}

      {showPatternSlide && (
        <SoloSlideScreen slide={PATTERN_SLIDE} onComplete={() => {
          setShowPatternSlide(false);
          // Reset board before first challenge
          setAttached([]); setParams({}); setExpanded(null); setSelected(null);
          setTimeout(() => {
            setChallengeIdx(0);
            setShowChallenge(true);
            setShowSolution(false);
          }, 300);
        }} />
      )}

      {/* Outro slides after all challenges complete */}
      {showOutro && (
        <OutroScreen
          onPlayAgain={() => {
            setShowOutro(false);
            // Reset to welcome popup (before unit builder)
            // Reset all progress
            setAttached([]); setParams({}); setExpanded(null); setSelected(null);
            setUnlockedIds([...STARTER_IDS]);
            setPrevRendererAttached(false);
            setRendererPopup(false); setRendererShown(false);
            setSpriteDonePopup(false); setSpriteDoneShown(false);
            setSpriteHint(null); setStage2Popup(false); setStage2Shown(false);
            setFullRevealTime(null); setChallengeIdx(-1);
            setShowChallenge(false); setShowSolution(false); setShowSuccess(false);
            setFreeformMode(false); setSpritesUnlocked(false);
          }}
          onFreeform={() => {
            setShowOutro(false);
            setFreeformMode(true);
            setSpritesUnlocked(true);
            setChallengeIdx(-1);
            setShowChallenge(false); setShowSuccess(false);
          }}
        />
      )}

      {/* Challenge brief popup   shown at start of each challenge + via HELP */}
      {showChallenge && activeChallenge && (
        <ChallengePopup
          ch={activeChallenge}
          onDismiss={() => setShowChallenge(false)}
          showSolution={showSolution}
          onToggleSolution={() => setShowSolution(s => !s)}
        />
      )}

      {/* Success popup */}
      {showSuccess && activeChallenge && (
        <SuccessPopup
          ch={activeChallenge}
          isLast={challengeIdx === CHALLENGES.length - 1}
          onNext={onSuccessNext}
        />
      )}

      <div className="mw-root" style={{
        height:"100dvh", background:P.bg,
        display:"flex", flexDirection:"column",
        fontFamily:"'Jost',sans-serif", color:P.text,
        maxWidth:540, margin:"0 auto", overflow:"hidden",
        opacity: showIntro ? 0 : 1,
        animation: showIntro ? "none" : "mwAppBuildIn 0.7s cubic-bezier(.34,1.1,.64,1) forwards",
      }}>

        {/*    HEADER    */}
        <div style={{
          display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"5px 10px", flexShrink:0,
          borderBottom:"1px solid " + P.border, background:P.panelB,
        }}>
          {/* Stage label — top left */}
          <div>
            <div style={{
              fontFamily:"'Jost',sans-serif", fontSize:22, fontWeight:700,
              color:P.goldLt, letterSpacing:2.5,
            }}>UNIT BUILDER</div>
            <div style={{ fontSize:9, color:P.textMd, fontFamily:"monospace", marginTop:2, letterSpacing:.5 }}>
              {!rendererPopup && !spriteDonePopup && !stage2Popup && !activeChallenge && !freeformMode
                ? (!attached.some(t=>t.id==="form") ? "ADD A RENDERER COMPONENT"
                  : !starterRevealTime ? "ADD A RENDERER COMPONENT"
                  : !stage2Shown ? "ADD MORE COMPONENTS"
                  : !spriteDoneShown ? "CHANGE THE RENDERER SPRITE"
                  : "ADD MORE COMPONENTS")
                : freeformMode
                  ? "FREEFORM MODE"
                  : activeChallenge
                    ? ("CHALLENGE " + (challengeIdx+1) + " — " + activeChallenge.name.toUpperCase())
                    : ""}
            </div>
          </div>

          {/* Right side: progress dots + buttons */}
          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:5 }}>
            {/* Challenge progress dots — only shown once challenges started */}
            {challengeIdx >= 0 && (
              <div style={{ display:"flex", gap:5 }}>
                {CHALLENGES.map((_, i) => (
                  <div key={i} style={{
                    width: i === challengeIdx ? 14 : 5, height:4, borderRadius:2,
                    background: i < challengeIdx ? P.amber
                              : i === challengeIdx ? P.goldLt
                              : P.border,
                    transition:"all .3s",
                  }} />
                ))}
              </div>
            )}
            {/* Buttons */}
            <div style={{ display:"flex", gap:5 }}>
              {activeChallenge && (
                <button className="mw-btn" onClick={() => { setShowChallenge(true); setShowSolution(false); }} style={{
                  padding:"4px 10px",
                  border:"1.5px solid " + P.goldLt, borderRadius:3,
                  background:"rgba(255,250,192,.15)",
                  color:P.goldLt, fontSize:8, letterSpacing:1, fontWeight:700,
                  animation:"mwHelpPulse 2s ease-in-out infinite",
                }}>CHALLENGE</button>
              )}
              <button className="mw-btn" onClick={resetAll} style={{
                padding:"4px 10px",
                border:"1px solid rgba(200,150,40,.3)", borderRadius:3,
                background:"transparent",
                color:P.textMd, fontSize:8, letterSpacing:1, fontWeight:500,
              }}>RESET</button>
            </div>
          </div>
        </div>

        {/* Challenge feature checklist — only during active challenge */}
        {activeChallenge && (
          <div style={{
            borderBottom:"1px solid " + P.border,
            background:"rgba(0,0,0,.25)",
            padding:"5px 10px",
            flexShrink:0,
          }}>
            <div style={{
              display:"grid",
              gridTemplateColumns:"1fr 1fr",
              gap:"3px 8px",
            }}>
              {[
                // Sprite bullet — done when correct sprite is selected
                { label: activeChallenge.spriteLabel,
                  done: isOn("form") && ((params["form"]&&params["form"]["sprite"]) || "abstract") === activeChallenge.sprite },
                // Ability bullets — each maps 1:1 to bulletComponents
                ...activeChallenge.abilityBullets.map((label, i) => {
                  const compId = activeChallenge.bulletComponents[i];
                  // _max sentinel: done when component count is within limit
                  if (compId === "_max") {
                    return { label, done: attached.length <= activeChallenge.maxComponents };
                  }
                  // Dragon: some bullets also require a slider at max
                  const needsParam = activeChallenge.paramBulletIdx && activeChallenge.paramBulletIdx.includes(i);
                  let done = isOn(compId);
                  if (done && needsParam && activeChallenge.paramChecks) {
                    const pc = activeChallenge.paramChecks.find(p => p.id === compId);
                    if (pc) {
                      done = (params[pc.id] && params[pc.id][pc.key] != null)
                        ? Number(params[pc.id][pc.key]) >= pc.val
                        : false;
                    }
                  }
                  return { label, done };
                })
              ].map((item, i) => (
                <div key={i} style={{
                  display:"flex", alignItems:"center", gap:5,
                  fontSize:11, lineHeight:1.5,
                  color: item.done ? P.goldLt : P.textMd,
                  transition:"color .4s",
                }}>
                  <span style={{
                    fontSize:11, flexShrink:0,
                    color: item.done ? P.amber : P.textDk,
                  }}>{item.done ? "✓" : "▸"}</span>
                  {item.label}
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{
          flex:1, display:"flex", flexDirection:"column",
          gap:2, padding:4, overflow:"hidden",
        }}>

          {/* TOP ROW */}
          <div style={{ flex:"0 0 55%", display:"flex", gap:2, minHeight:0 }}>
            <Panel
              title="GAME"
              isDrop={isOverGame}
              containerRef={gameRef}
              sx={{ flex:"0 0 calc(62% - 1px)" }}
            >
              <GameView attached={attached} params={gameParams} />
            </Panel>

            <Panel
              title="DETAILS"
              isDrop={isOverInspector}
              containerRef={inspectorRef}
              sx={{ flex:1 }}
              right={challenge && (
                <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <div style={{ width:38, height:2, background:P.border, borderRadius:2, overflow:"hidden" }}>
                    <div style={{
                      height:"100%",
                      width: chalTotal > 0 ? (chalProgress / chalTotal * 100) + "%" : "0%",
                      background: chalDone ? P.green : P.gold,
                      borderRadius:2, transition:"width .35s",
                    }} />
                  </div>
                  <span style={{ fontSize:7, color:P.textMd, fontFamily:"monospace" }}>
                    {chalProgress}/{chalTotal}
                  </span>
                </div>
              )}
            >
              {/* Entity root row */}
              <div style={{
                display:"flex", alignItems:"center", gap:4,
                padding:"3px 6px", borderBottom:"1px solid " + P.border,
                background:P.panelAlt,
              }}>
                <span style={{ fontSize:14 }}>📦</span>
                <span style={{ fontSize:13, color:P.amber, fontFamily:"'Jost',sans-serif" }}>Entity</span>
              </div>

              {attached.length === 0 ? (
                <div style={{
                  padding:"8px 6px", textAlign:"center",
                  fontSize:12, color:P.textDk, lineHeight:1.8, fontFamily:"monospace",
                }}>
                  -- no components -- drag here or tap ATTACH
                </div>
              ) : attached.map(renderAttachedRow)}
            </Panel>
          </div>

          {/* BOTTOM ROW   even 50/50 split */}
          <div style={{ flex:1, display:"flex", gap:2, minHeight:0 }}>

            {/* COMPONENTS panel */}
            <Panel title="COMPONENTS" sx={{ flex:"0 0 calc(50% - 1px)" }}>
              {TRAITS.filter(trait => unlockedIds.includes(trait.id)).map(renderTraitRow)}
            </Panel>

            {/* PREVIEW panel   hint when nothing selected, description when trait selected */}
            <Panel title="PREVIEW" sx={{ flex:1 }}>
              {selected && selected.type === "trait" ? (
                /* ── TRAIT DESCRIPTION ── */
                <div style={{ padding:"10px 10px", height:"100%", overflow:"auto" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <span style={{ fontSize:26, lineHeight:1, flexShrink:0 }}>{selected.data.emoji}</span>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700, color:P.text, letterSpacing:.3 }}>
                        {selected.data.name}
                      </div>
                      <div style={{ fontSize:10, color:P.textDk, fontFamily:"monospace", letterSpacing:1, marginTop:2 }}>
                        {selected.data.cat.toUpperCase()}
                      </div>
                    </div>
                  </div>
                  <div style={{
                    padding:"6px 8px", borderRadius:4,
                    border:"1px solid " + P.border, background:P.panelAlt,
                    marginBottom:10,
                  }}>
                    <div style={{ fontSize:9, color:P.textDk, fontFamily:"monospace", letterSpacing:1, marginBottom:3 }}>
                      GRANTS
                    </div>
                    <div style={{ fontSize:12, color:P.text, fontStyle:"italic" }}>
                      {selected.data.ability}
                    </div>
                  </div>

                  {/* Code snippet preview */}
                  {CODE_SNIPPETS[selected.data.id] && (
                    <div style={{
                      borderRadius:4,
                      border:"1px solid rgba(80,120,220,.25)",
                      background:"rgba(10,6,26,.85)",
                      padding:"8px 10px",
                      marginBottom:10,
                    }}>
                      <div style={{ fontSize:9, color:"rgba(80,120,220,.6)", fontFamily:"monospace", letterSpacing:1, marginBottom:6 }}>
                        {"// " + selected.data.name + ".cs"}
                      </div>
                      {CODE_SNIPPETS[selected.data.id].map((snippet, i) => (
                        <div key={i} style={{
                          fontFamily:"monospace",
                          fontSize:10,
                          lineHeight:1.7,
                          color: snippet.startsWith("//") ? "rgba(120,180,120,.75)"
                               : snippet.includes("(")   ? "rgba(180,150,255,.85)"
                               : "rgba(200,180,120,.85)",
                        }}>{snippet}</div>
                      ))}
                    </div>
                  )}
                  <button className="mw-btn"
                    onClick={() => isOn(selected.data.id) ? detach(selected.data.id) : attachAndCheck(selected.data.id)}
                    style={{
                      width:"100%", padding:"7px",
                      border:"1px solid " + (isOn(selected.data.id) ? P.red : P.gold),
                      borderRadius:4,
                      background: isOn(selected.data.id) ? "rgba(156,48,48,.1)" : "rgba(196,154,44,.1)",
                      color: isOn(selected.data.id) ? P.redLt : P.goldLt,
                      fontSize:12, letterSpacing:1, fontWeight:600,
                      animation: isOn(selected.data.id) ? "none" : "mwGlow 1.6s ease-in-out infinite",
                    }}>
                    {isOn(selected.data.id) ? "x  REMOVE FROM ENTITY" : "+  ATTACH TO ENTITY"}
                  </button>
                </div>
              ) : (
                /* ── DEFAULT HINT — blank ── */
                <div style={{
                  height:"100%", display:"flex",
                  alignItems:"center", justifyContent:"center",
                  padding:16,
                }} />
              )}
            </Panel>
          </div>
        </div>

      {/*    FIXED OVERLAYS   rendered at true viewport level, unaffected by zoom    */}


        {/*    WIN OVERLAY    */}
        {showWin && (
          <div onClick={() => setShowWin(false)} style={{
            position:"fixed", inset:0, zIndex:500,
            background:"rgba(7,6,15,.93)",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>
            <div style={{
              background:P.panel, border:"2px solid " + P.gold,
              borderRadius:12, padding:"30px 44px",
              textAlign:"center", position:"relative",
              animation:"mwWin .3s ease-out",
            }}>
              <Corners active={true} />
              <div style={{ fontSize:52, lineHeight:1 }}>{challenge ? challenge.emoji : ""}</div>
              <div style={{
                fontFamily:"'Jost',sans-serif", fontSize:17,
                color:P.goldLt, marginTop:12, letterSpacing:2,
              }}>CREATURE FORGED</div>
              <div style={{ fontSize:12, color:P.textMd, marginTop:5, fontStyle:"italic" }}>
                {challenge ? challenge.name : ""} enters the dungeon
              </div>
              <div style={{ marginTop:6, fontSize:8, color:P.textDk, fontFamily:"monospace" }}>
                tap to continue
              </div>
            </div>
          </div>
        )}

        {/*    LEVEL UP POPUP   removed, replaced by stage 2    */}

        {/*    STAGE 2 POPUP   all starter components attached    */}
        {stage2Popup && (
          <div style={{
            position:"fixed", inset:0, zIndex:700,
            background:"rgba(5,3,14,.88)",
            display:"flex", alignItems:"center", justifyContent:"center",
            padding:"20px",
            animation:"mwModalIn .25s ease",
          }}>
            <div style={{
              width:"100%", maxWidth:340,
              background:P.panel,
              border:"1.5px solid " + P.amber,
              borderRadius:12, padding:"24px 22px",
              textAlign:"center", position:"relative",
              animation:"mwWin .3s ease-out",
            }}>
              <Corners active={true} />
              <div style={{ fontSize:30, marginBottom:10 }}>👤⚔️🧠🦶</div>
              <div style={{
                fontSize:18, fontWeight:700, color:P.goldLt,
                letterSpacing:.8, marginBottom:12,
              }}>YOU BUILT A MELEE ATTACKER</div>
              <div style={{
                fontSize:17, color:P.textMd, lineHeight:1.85, marginBottom:18,
              }}>
                With these four components you've created a unit that has a visible body,
                moves through the world, seeks out enemies, and damages them on contact.
              </div>
              <button className="mw-btn" onClick={dismissStage2} style={{
                width:"100%", padding:"10px",
                border:"1.5px solid " + P.amber, borderRadius:6,
                background:"rgba(196,154,44,.12)",
                color:P.goldLt, fontSize:14, letterSpacing:1.2, fontWeight:700,
                animation:"mwGlow 1.6s ease-in-out infinite",
              }}>CONTINUE</button>
            </div>
          </div>
        )}

        {/*    RENDERER POPUP   "try changing the sprite"    */}
        {rendererPopup && (
          <div style={{
            position:"fixed", inset:0, zIndex:700,
            background:"rgba(5,3,14,.88)",
            display:"flex", alignItems:"center", justifyContent:"center",
            padding:"20px", animation:"mwModalIn .25s ease",
          }}>
            <div style={{
              width:"100%", maxWidth:320,
              background:P.panel, border:"1.5px solid " + P.amber,
              borderRadius:12, padding:"24px 22px",
              textAlign:"center", position:"relative",
              animation:"mwWin .3s ease-out",
            }}>
              <Corners active={true} />
              <div style={{ fontSize:30, marginBottom:10 }}>👤</div>
              <div style={{ fontSize:18, fontWeight:700, color:P.goldLt, letterSpacing:.8, marginBottom:12 }}>
                RENDERER ATTACHED
              </div>
              <div style={{ fontSize:17, color:P.textMd, lineHeight:1.85, marginBottom:14 }}>
                The Renderer gives your unit a visible body.
              </div>
              <button className="mw-btn" onClick={dismissRenderer} style={{
                width:"100%", padding:"10px",
                border:"1.5px solid " + P.amber, borderRadius:6,
                background:"rgba(196,154,44,.12)",
                color:P.goldLt, fontSize:14, letterSpacing:1.2, fontWeight:700,
                animation:"mwGlow 1.6s ease-in-out infinite",
              }}>CONTINUE</button>
            </div>
          </div>
        )}

        {/*    SPRITE DONE POPUP   congrats + next challenge    */}
        {spriteDonePopup && (
          <div style={{
            position:"fixed", inset:0, zIndex:700,
            background:"rgba(5,3,14,.88)",
            display:"flex", alignItems:"center", justifyContent:"center",
            padding:"20px", animation:"mwModalIn .25s ease",
          }}>
            <div style={{
              width:"100%", maxWidth:320,
              background:P.panel, border:"1.5px solid " + P.amber,
              borderRadius:12, padding:"24px 22px",
              textAlign:"center", position:"relative",
              animation:"mwWin .3s ease-out",
            }}>
              <Corners active={true} />
              <div style={{ fontSize:38, marginBottom:10, lineHeight:1 }}>
                {(() => { const sp = SPRITES.find(s => s.id === currentSprite); return sp && sp.emoji ? sp.emoji : "👤"; })()}
              </div>
              <div style={{ fontSize:18, fontWeight:700, color:P.goldLt, letterSpacing:.8, marginBottom:12 }}>
                UNIT CUSTOMIZED
              </div>
              <div style={{ fontSize:17, color:P.textMd, lineHeight:1.85, marginBottom:14 }}>
                Each component holds its own data and can be tuned independently.
              </div>
              <div style={{ fontSize:15, color:P.textDk, lineHeight:1.75, marginBottom:18, fontStyle:"italic" }}>
                The same component can behave differently on every unit.
              </div>
              <button className="mw-btn" onClick={dismissSpriteDone} style={{
                width:"100%", padding:"10px",
                border:"1.5px solid " + P.amber, borderRadius:6,
                background:"rgba(196,154,44,.12)",
                color:P.goldLt, fontSize:14, letterSpacing:1.2, fontWeight:700,
                animation:"mwGlow 1.6s ease-in-out infinite",
              }}>GOT IT</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(MonsterWorkshop));

  </script>
  <script>
    function showError(msg) {
      document.body.innerHTML =
        '<div style="color:#f88;background:#111;padding:24px;font-family:monospace;' +
        'font-size:13px;white-space:pre-wrap;position:fixed;inset:0;overflow:auto;z-index:99999">' +
        msg.replace(/</g,"&lt;").replace(/>/g,"&gt;") + "</div>";
    }
    window.addEventListener("load", function() {
      try {
        var src = document.getElementById("app-source").textContent;
        var result = Babel.transform(src, { presets: ["react"], filename: "app.jsx" });
        new Function(result.code)();
      } catch(e) {
        showError("ERROR: " + e.message + "\n\n" + (e.stack || ""));
      }
    });
  </script>
</body>
</html>
